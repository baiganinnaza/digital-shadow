services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shadow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shadow}
      POSTGRES_DB: ${POSTGRES_DB:-digital_shadow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shadow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/shadowpass}
      NEO4J_PLUGINS: "[]"
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shadow}:${POSTGRES_PASSWORD:-shadow}@postgres:5432/${POSTGRES_DB:-digital_shadow}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-shadowpass}
      USE_LOCAL_LLM: "false"
      WALLET_BLACKLIST_PATH: /app/data/wallet_blacklist.txt
      MODEL_PATH: /app/ml/models/clf.joblib
    volumes:
      - ./data:/app/data
      - ./ml/models:/app/ml/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: rq worker --url redis://redis:6379/0 default
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shadow}:${POSTGRES_PASSWORD:-shadow}@postgres:5432/${POSTGRES_DB:-digital_shadow}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-shadowpass}
      WALLET_BLACKLIST_PATH: /app/data/wallet_blacklist.txt
      MODEL_PATH: /app/ml/models/clf.joblib
    volumes:
      - ./data:/app/data
      - ./ml/models:/app/ml/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python -m app.scheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shadow}:${POSTGRES_PASSWORD:-shadow}@postgres:5432/${POSTGRES_DB:-digital_shadow}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-shadowpass}
      SEED_FILE_PATH: /app/data/seed_posts.jsonl
      WALLET_BLACKLIST_PATH: /app/data/wallet_blacklist.txt
    volumes:
      - ./data:/app/data
      - ./ml/models:/app/ml/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

