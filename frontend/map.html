<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPLEX — Карта</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1117;--bg-panel:#161B22;
  --cyan:#2F81F7;--cyan-b:#58A6FF;
  --red:#F85149;--amber:#D29922;--green:#3FB950;
  --text:#E6EDF3;--text-mid:#8B949E;--text-dim:#484F58;
  --border:#30363D;--border-mid:#6E7681;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;--display:'Space Grotesk',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#000;color:var(--text);font-family:var(--sans);display:flex;flex-direction:column}

.topbar{height:44px;background:rgba(22,27,34,.92);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0;z-index:30;backdrop-filter:blur(8px)}
.logo{font-family:var(--display);font-size:13px;font-weight:700;color:var(--text);letter-spacing:.12em;margin-right:4px}
.logo-dot{color:var(--cyan-b)}
.topbar-div{width:1px;height:20px;background:var(--border);margin:0 14px;flex-shrink:0}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2.4s ease-in-out infinite;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
.live-label{font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:1.5px}
.nav-pills{display:flex;gap:0;margin-left:14px}
.nav-pill{font-family:var(--mono);font-size:10px;padding:0 13px;height:44px;line-height:44px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;text-decoration:none;transition:color .15s,border-color .15s;letter-spacing:.8px;display:inline-flex;align-items:center}
.nav-pill:hover{color:var(--text-mid)}
.nav-pill.active{color:var(--cyan-b);border-bottom-color:var(--cyan-b)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:2px;background:rgba(47,129,247,.07);border:1px solid rgba(47,129,247,.2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--cyan-b)}

.globe-wrap{flex:1;position:relative;overflow:hidden;background:#000}
#globeViz{position:absolute;inset:0;width:100%;height:100%}

.tab-bar{position:absolute;top:14px;left:14px;z-index:20;display:flex;gap:4px;background:rgba(13,17,23,.85);border:1px solid rgba(48,54,61,.8);border-radius:4px;padding:4px;backdrop-filter:blur(12px)}
.tab-btn{font-family:var(--mono);font-size:9px;letter-spacing:.8px;padding:6px 13px;border-radius:2px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text-dim);transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text-mid)}
.tab-btn.active{color:var(--cyan-b);background:rgba(47,129,247,.1);border-color:rgba(47,129,247,.3)}

.legend-box{position:absolute;bottom:44px;left:14px;z-index:20;background:rgba(13,17,23,.85);border:1px solid rgba(48,54,61,.8);border-radius:4px;padding:10px 14px;backdrop-filter:blur(12px);min-width:155px}
.leg-title{font-family:var(--mono);font-size:8px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.leg-row:last-child{margin-bottom:0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-label{font-family:var(--mono);font-size:9px;color:var(--text-mid)}

.tooltip{position:fixed;background:rgba(22,27,34,.96);border:1px solid var(--border-mid);border-radius:3px;padding:10px 13px;font-family:var(--mono);font-size:10px;color:var(--text);pointer-events:none;z-index:60;min-width:170px;box-shadow:0 4px 24px rgba(0,0,0,.8);display:none;backdrop-filter:blur(8px)}
.tt-title{font-family:var(--sans);font-size:12px;font-weight:600;margin-bottom:5px}
.tt-row{font-size:9px;color:var(--text-mid);margin-top:3px}
.tt-row b{color:var(--text)}

.rp{position:fixed;right:0;top:44px;bottom:32px;width:0;background:rgba(22,27,34,.96);border-left:1px solid var(--border);overflow:hidden;transition:width .25s cubic-bezier(.4,0,.2,1);z-index:40;backdrop-filter:blur(12px)}
.rp.open{width:310px}
.rp-inner{width:310px;padding:15px;display:flex;flex-direction:column;gap:13px;overflow-y:auto;height:100%}
.rp-inner::-webkit-scrollbar{width:3px}.rp-inner::-webkit-scrollbar-thumb{background:var(--border)}
.panel-close{background:none;border:1px solid var(--border);color:var(--text-dim);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .15s;align-self:flex-end;font-family:var(--mono)}
.panel-close:hover{border-color:rgba(248,81,73,.35);color:var(--red)}
.rp-tag{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px}
.rp-name{font-family:var(--display);font-size:16px;font-weight:600;line-height:1.3}
.rp-sub{font-family:var(--sans);font-size:11px;color:var(--text-mid);margin-top:3px;line-height:1.5}
.rp-section{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat-box{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:2px;padding:10px;text-align:center}
.stat-val{font-family:var(--mono);font-size:18px;font-weight:700;margin-bottom:2px}
.stat-lbl{font-family:var(--mono);font-size:8px;color:var(--text-dim);letter-spacing:.5px}
.rp-btn{width:100%;font-family:var(--mono);font-size:9px;letter-spacing:.8px;padding:8px;border-radius:2px;cursor:pointer;transition:all .15s;text-transform:uppercase;border:1px solid;margin-top:4px;text-align:center;display:block;text-decoration:none;background:none}
.rp-btn-g{color:var(--text-dim);border-color:var(--border)}
.rp-btn-g:hover{color:var(--text-mid);border-color:var(--border-mid)}

.bottom-bar{height:32px;background:rgba(22,27,34,.92);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 18px;flex-shrink:0;z-index:30;backdrop-filter:blur(8px)}
.bstat{font-family:var(--mono);font-size:9px;color:var(--text-dim);padding:0 14px;border-right:1px solid var(--border)}
.bstat:first-child{padding-left:0}
.bstat b{color:var(--cyan-b)}
.bstat-right{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--text-dim)}

.globe-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:10;background:#000}
.globe-loading-text{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:1.5px;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SIMPLEX<span class="logo-dot">.</span></div>
  <div class="topbar-div"></div>
  <div class="live-dot"></div>
  <span class="live-label">LIVE</span>
  <div class="topbar-div"></div>
  <nav class="nav-pills">
    <a class="nav-pill" href="index.html">ЛЕНТА</a>
    <a class="nav-pill" href="board.html" target="_blank">ДОСКА</a>
    <a class="nav-pill" href="graph.html">ГРАФ</a>
    <a class="nav-pill active" href="#">КАРТА</a>
    <a class="nav-pill" href="cases.html">КЕЙСЫ</a>
  </nav>
  <div class="topbar-right">
    <div class="avatar">АН</div>
  </div>
</div>

<div class="globe-wrap" id="globeWrap">
  <div id="globeViz">
    <div class="globe-loading" id="loadingEl">
      <div class="globe-loading-text">ЗАГРУЗКА ГЛОБУСА...</div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-regions"       onclick="setTab('regions',this)">◎ РЕГИОНЫ РК</button>
    <button class="tab-btn"        id="tab-jurisdictions" onclick="setTab('jurisdictions',this)">⬡ ЮРИСДИКЦИИ</button>
    <button class="tab-btn"        id="tab-flows"         onclick="setTab('flows',this)">↗ ПОТОКИ</button>
  </div>
  <div class="legend-box" id="legendBox"></div>
</div>

<div class="rp" id="rp">
  <div class="rp-inner" id="rpInner"></div>
</div>

<div class="bottom-bar">
  <span class="bstat" id="bS1"></span>
  <span class="bstat" id="bS2"></span>
  <span class="bstat" id="bS3"></span>
  <div class="bstat-right" id="bTime"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="//unpkg.com/globe.gl"></script>
<script>
/* ══════════════════ DATA ══════════════════ */

const RC = {critical:'#F85149', high:'#D29922', medium:'#FF9200', low:'#3FB950'};
const RL = {critical:'Критический', high:'Высокий', medium:'Средний', low:'Низкий'};

  {name:'Тараз',            lat:42.900, lng:71.363, signals:6,  cases:1, risk:'medium',   desc:'Закладки · Вейп-контрабанда'},
  {name:'Кызылорда',        lat:44.852, lng:65.509, signals:12, cases:1, risk:'medium',   desc:'Закладки · Telegram-каналы'},

  {name:'Атырау',           lat:47.117, lng:51.920, signals:5,  cases:0, risk:'medium',   desc:'Контрабанда нефтепродуктов'},
  {name:'Актау',            lat:43.652, lng:51.157, signals:4,  cases:0, risk:'medium',   desc:'Транзит через Каспий'},
  {name:'Усть-Каменогорск', lat:49.948, lng:82.628, signals:4,  cases:0, risk:'low',      desc:'Фишинг · Мошенничество'},
  {name:'Павлодар',         lat:52.287, lng:76.967, signals:3,  cases:0, risk:'low',      desc:'OLX-мошенничество'},
  {name:'Семей',            lat:50.411, lng:80.226, signals:3,  cases:0, risk:'low',      desc:'Мелкое мошенничество'},
  {name:'Костанай',         lat:53.214, lng:63.625, signals:2,  cases:0, risk:'low',      desc:'Мошенничество'},
];

const JURISDICTIONS = [
  {name:'Россия',    city:'Москва',    lat:55.751, lng:37.617, cases:23, risk:'critical', mla:'Сложно', desc:'DarkNet-хостинг · Telegram-каналы · Управление дропами'},
  {name:'ОАЭ',      city:'Дубай',     lat:25.204, lng:55.270, cases:12, risk:'high',     mla:'Да',      desc:'Транзит средств · Crypto OTC · Обналичивание'},
  {name:'Турция',   city:'Стамбул',   lat:41.015, lng:28.979, cases:8,  risk:'medium',   mla:'Да',      desc:'Транзит наличных · Нелегальный обмен валюты'},
  {name:'Белиз',    city:'Бельмопан', lat:17.250, lng:-88.770,cases:7,  risk:'high',     mla:'Нет',     desc:'Офшорные компании · Номинальные директора'},
  {name:'Беларусь', city:'Минск',     lat:53.904, lng:27.561, cases:5,  risk:'medium',   mla:'Да',      desc:'Крипто-биржи без KYC · P2P-обмен'},
  {name:'Кипр',     city:'Никосия',   lat:35.166, lng:33.363, cases:4,  risk:'medium',   mla:'Да',      desc:'Офшорные счета · Корпоративные схемы'},
  {name:'Грузия',   city:'Тбилиси',   lat:41.694, lng:44.833, cases:3,  risk:'low',      mla:'Да',      desc:'Крипто-обмен · P2P'},
];

const FLOWS = [
  {sLat:51.18, sLng:71.45, eLat:55.751,  eLng:37.617,  label:'Астана → Москва',   detail:'DarkNet-канал',          amount:'23 связи', type:'darknet', color:'#CC44FF', alt:0.32},
  {sLat:43.24, sLng:76.94, eLat:25.204,  eLng:55.270,  label:'Алматы → Дубай',    detail:'Криптовалюта OTC',       amount:'$2.4M',    type:'crypto',  color:'#00D4FF', alt:0.40},
  {sLat:51.18, sLng:71.45, eLat:17.250,  eLng:-88.770, label:'Астана → Белиз',    detail:'Офшорные компании',      amount:'$850K',    type:'money',   color:'#D29922', alt:0.52},
  {sLat:42.32, sLng:69.59, eLat:41.015,  eLng:28.979,  label:'Шымкент → Стамбул', detail:'Транзит наличных',       amount:'$320K',    type:'cash',    color:'#3FB950', alt:0.28},
  {sLat:43.24, sLng:76.94, eLat:53.904,  eLng:27.561,  label:'Алматы → Минск',    detail:'Крипто-биржи P2P',       amount:'$180K',    type:'crypto',  color:'#00D4FF', alt:0.34},
  {sLat:51.18, sLng:71.45, eLat:35.166,  eLng:33.363,  label:'Астана → Кипр',     detail:'Корпоративные счета',    amount:'$1.2M',    type:'money',   color:'#D29922', alt:0.44},
  {sLat:43.24, sLng:76.94, eLat:41.694,  eLng:44.833,  label:'Алматы → Тбилиси',  detail:'P2P крипто-обмен',       amount:'$95K',     type:'crypto',  color:'#00D4FF', alt:0.26},
  {sLat:25.20, sLng:55.27, eLat:17.250,  eLng:-88.770, label:'Дубай → Белиз',     detail:'Офшорная цепочка',       amount:'$1.8M',    type:'money',   color:'#D29922', alt:0.46},
];

const LEGENDS = {
  regions:`<div class="leg-title">Уровень риска</div>
    <div class="leg-row"><div class="leg-dot" style="background:#F85149"></div><span class="leg-label">Критический</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#D29922"></div><span class="leg-label">Высокий</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#FF9200"></div><span class="leg-label">Средний</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#3FB950"></div><span class="leg-label">Низкий</span></div>`,
  jurisdictions:`<div class="leg-title">Юрисдикция</div>
    <div class="leg-row"><div class="leg-dot" style="background:#F85149"></div><span class="leg-label">Критическая</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#D29922"></div><span class="leg-label">Высокий риск</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#FF9200"></div><span class="leg-label">Средний риск</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#3FB950"></div><span class="leg-label">Низкий риск</span></div>`,
  flows:`<div class="leg-title">Тип потока</div>
    <div class="leg-row"><div class="leg-dot" style="background:#CC44FF"></div><span class="leg-label">DarkNet</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#00D4FF"></div><span class="leg-label">Криптовалюта</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#D29922"></div><span class="leg-label">Офшор / Деньги</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#3FB950"></div><span class="leg-label">Наличные</span></div>`,
};

/* ══════════════════ GLOBE ══════════════════ */

let globe, rotTimer, mouseX = 0, mouseY = 0;

function initGlobe() {
  const wrap = document.getElementById('globeWrap');

  globe = Globe()
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
    .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
    .atmosphereColor('#3D6FCF')
    .atmosphereAltitude(0.14)
    .width(wrap.clientWidth)
    .height(wrap.clientHeight)
    (document.getElementById('globeViz'));

  globe.onGlobeReady(() => {
    document.getElementById('loadingEl').style.display = 'none';

    const ctrl = globe.controls();
    ctrl.autoRotate      = false;   // off until camera settles
    ctrl.autoRotateSpeed = 0.35;
    ctrl.enableDamping   = true;
    ctrl.dampingFactor   = 0.08;
    ctrl.minDistance     = 101;
    ctrl.maxDistance     = 750;

    ctrl.addEventListener('start', () => { ctrl.autoRotate = false; });
    ctrl.addEventListener('end',   () => {
      clearTimeout(rotTimer);
      rotTimer = setTimeout(() => { ctrl.autoRotate = true; }, 4000);
    });

    globe.pointOfView({lat:48, lng:66, altitude:1.9}, 0);
    setTab('regions', document.getElementById('tab-regions'));

    // enable rotation only after camera has snapped to Kazakhstan
    setTimeout(() => { ctrl.autoRotate = true; }, 800);
  });
}

window.addEventListener('resize', () => {
  if (!globe) return;
  const w = document.getElementById('globeWrap');
  globe.width(w.clientWidth).height(w.clientHeight);
});

document.getElementById('globeWrap').addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
});

/* ══════════════════ TABS ══════════════════ */

function setTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('legendBox').innerHTML = LEGENDS[tab] || '';
  closePanel();
  if      (tab === 'regions')       showRegions();
  else if (tab === 'jurisdictions') showJurisdictions();
  else if (tab === 'flows')         showFlows();
}

/* ─── РЕГИОНЫ РК ─── */
function showRegions() {
  const totSig  = KZ_REGIONS.reduce((s,r)=>s+r.signals,0);
  const totCase = KZ_REGIONS.reduce((s,r)=>s+r.cases,0);
  stats(`<b>${KZ_REGIONS.length}</b> регионов`, `<b>${totSig}</b> сигналов`, `<b>${totCase}</b> кейсов`);

  const rings = KZ_REGIONS.filter(r=>r.risk==='critical'||r.risk==='high').map(r=>({
    lat:r.lat, lng:r.lng,
    maxR: r.risk==='critical'?3.2:2,
    speed:4, period: r.risk==='critical'?600:900
  }));

  globe
    .arcsData([])
    .ringsData(rings)
    .ringLat('lat').ringLng('lng')
    .ringColor(() => t => `rgba(248,81,73,${(1-t)*0.5})`)
    .ringMaxRadius('maxR').ringPropagationSpeed('speed').ringRepeatPeriod('period')
    .pointsData(KZ_REGIONS)
    .pointLat(d => d.lat).pointLng(d => d.lng)
    .pointAltitude(0.006)
    .pointRadius(d => 2.2 + d.signals/16)
    .pointColor(d => RC[d.risk])
    .pointResolution(20)
    .labelsData(KZ_REGIONS.filter(r=>r.signals>=5))
    .labelLat(d => d.lat).labelLng(d => d.lng).labelText('name')
    .labelSize(d => 0.42 + d.signals/150)
    .labelColor(d => RC[d.risk]+'EE')
    .labelAltitude(0.012)
    .onPointClick(d => panel('◎ Регион РК', d.name, RC[d.risk], d.desc,
      [{val:d.signals,lbl:'СИГНАЛЫ'},{val:d.cases,lbl:'КЕЙСЫ'}],
      `Уровень риска: <b style="color:${RC[d.risk]}">${RL[d.risk]}</b>`))
    .onPointHover(d => tip(d,
      d?`◎ ${d.name}`:null,
      d?[`Сигналов: <b>${d.signals}</b>`,`Кейсов: <b>${d.cases}</b>`,`Риск: <b style="color:${RC[d.risk]}">${RL[d.risk]}</b>`]:[]
    ));

  globe.pointOfView({lat:48, lng:66, altitude:1.9}, 1000);
}

/* ─── ЮРИСДИКЦИИ ─── */
function showJurisdictions() {
  const totCases = JURISDICTIONS.reduce((s,j)=>s+j.cases,0);
  const mlaYes   = JURISDICTIONS.filter(j=>j.mla==='Да').length;
  stats(`<b>${JURISDICTIONS.length}</b> юрисдикций`, `<b>${totCases}</b> связанных кейсов`, `<b>${mlaYes}</b> MLA-доступно`);

  const kzBase = KZ_REGIONS.slice(0,3).map(r=>({...r,isKz:true}));
  const rings  = JURISDICTIONS.filter(j=>j.risk==='critical'||j.risk==='high').map(j=>({
    lat:j.lat, lng:j.lng, maxR:j.risk==='critical'?4:2.5, speed:3, period:680
  }));

  globe
    .arcsData([])
    .ringsData(rings)
    .ringLat('lat').ringLng('lng')
    .ringColor(() => t => `rgba(248,81,73,${(1-t)*0.45})`)
    .ringMaxRadius('maxR').ringPropagationSpeed('speed').ringRepeatPeriod('period')
    .pointsData([...JURISDICTIONS, ...kzBase])
    .pointLat(d => d.lat).pointLng(d => d.lng)
    .pointAltitude(0.005)
    .pointRadius(d => d.isKz ? 1.8 : 4.0 + (d.cases||0)/5)
    .pointColor(d => d.isKz ? '#2F81F7' : RC[d.risk])
    .pointResolution(20)
    .labelsData(JURISDICTIONS)
    .labelLat(d => d.lat).labelLng(d => d.lng).labelText('city')
    .labelSize(0.5).labelColor(d => RC[d.risk]+'DD')
    .labelAltitude(0.012)
    .onPointClick(d => {
      if (d.isKz) return;
      panel('⬡ Юрисдикция', `${d.name} · ${d.city}`, RC[d.risk], d.desc,
        [{val:d.cases,lbl:'КЕЙСОВ'},{val:d.mla,lbl:'MLA'}],
        `Риск: <b style="color:${RC[d.risk]}">${RL[d.risk]}</b>`);
    })
    .onPointHover(d => {
      if (!d||d.isKz){hideTip();return;}
      tip(d,`⬡ ${d.name}`,[`Город: <b>${d.city}</b>`,`Кейсов: <b>${d.cases}</b>`,`MLA-запрос: <b>${d.mla}</b>`,`Риск: <b style="color:${RC[d.risk]}">${RL[d.risk]}</b>`]);
    });

  globe.pointOfView({lat:42, lng:48, altitude:2.6}, 1000);
}

/* ─── ПОТОКИ ─── */
function showFlows() {
  stats(`<b>${FLOWS.length}</b> потоков`, `<b>$7.0M+</b> отслежено`, `<b>4</b> типа каналов`);

  /* deduplicated endpoint dots */
  const seen = new Set(), pts = [];
  FLOWS.forEach(f => {
    [[f.sLat,f.sLng,'#58A6FF'],[f.eLat,f.eLng,f.color]].forEach(([lat,lng,color])=>{
      const key = `${lat.toFixed(1)},${lng.toFixed(1)}`;
      if (!seen.has(key)){ seen.add(key); pts.push({lat,lng,color,r:1.2,alt:0.005}); }
    });
  });

  globe
    .ringsData([])
    .pointsData(pts)
    .pointLat(d => d.lat).pointLng(d => d.lng)
    .pointAltitude(d => d.alt).pointRadius(d => d.r).pointColor(d => d.color).pointResolution(16)
    .labelsData([])
    .arcsData(FLOWS)
    .arcStartLat(d => d.sLat).arcStartLng(d => d.sLng)
    .arcEndLat(d => d.eLat).arcEndLng(d => d.eLng)
    .arcColor(d => d.color)
    .arcDashLength(0.38).arcDashGap(0.15)
    .arcDashAnimateTime(2500)
    .arcStroke(1.6).arcAltitude(d => d.alt)
    .onArcClick(d => panel('↗ Поток', d.label, d.color, d.detail,
      [{val:d.amount,lbl:'ОБЪЁМ'},{val:d.type.toUpperCase(),lbl:'ТИП'}], ''))
    .onArcHover(d => {
      if (!d){hideTip();return;}
      tip(d,`↗ ${d.label}`,[`Детали: <b>${d.detail}</b>`,`Объём: <b>${d.amount}</b>`]);
    });

  globe.pointOfView({lat:38, lng:38, altitude:2.9}, 1000);
}

/* ══════════════════ PANEL ══════════════════ */

function panel(tag, name, color, sub, statArr, extra) {
  const stHtml = (statArr||[]).map(s=>`
    <div class="stat-box">
      <div class="stat-val" style="color:${color}">${s.val}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>`).join('');

  document.getElementById('rpInner').innerHTML = `
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div>
      <div class="rp-tag">${tag}</div>
      <div class="rp-name" style="color:${color}">${name}</div>
      ${sub?`<div class="rp-sub">${sub}</div>`:''}
    </div>
    ${stHtml?`<div class="stat-grid">${stHtml}</div>`:''}
    ${extra?`<div style="font-family:var(--mono);font-size:10px;color:var(--text-mid)">${extra}</div>`:''}
    <div style="margin-top:auto">
      <button class="rp-btn rp-btn-g" onclick="closePanel()">Закрыть</button>
    </div>`;

  document.getElementById('rp').classList.add('open');
}

function closePanel() {
  document.getElementById('rp').classList.remove('open');
}

/* ══════════════════ TOOLTIP ══════════════════ */

function tip(obj, title, rows) {
  if (!obj){hideTip();return;}
  const color = obj.color || (obj.risk?RC[obj.risk]:'var(--cyan-b)');
  const el = document.getElementById('tooltip');
  el.style.display = 'block';
  el.style.left = (mouseX+16)+'px';
  el.style.top  = (mouseY-12)+'px';
  el.innerHTML = `<div class="tt-title" style="color:${color}">${title||''}</div>
    ${rows.map(r=>`<div class="tt-row">${r}</div>`).join('')}`;
}
function hideTip(){ document.getElementById('tooltip').style.display='none'; }

/* ══════════════════ UTILS ══════════════════ */

function stats(s1,s2,s3){
  document.getElementById('bS1').innerHTML=s1;
  document.getElementById('bS2').innerHTML=s2;
  document.getElementById('bS3').innerHTML=s3;
}

(function tick(){
  const n=new Date();
  document.getElementById('bTime').textContent=
    'ОБНОВЛЕНО: '+n.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  setTimeout(tick,30000);
})();

/* ══════════════════ START ══════════════════ */

(function wait(){
  typeof Globe!=='undefined' ? initGlobe() : setTimeout(wait,80);
})();
</script>
