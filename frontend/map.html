<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simplex — Карта</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0B0F;--bg-panel:#111318;--bg-card:#161920;
  --cyan:#00F5FF;--red:#FF2D55;--amber:#FFB800;--green:#00FF9F;
  --purple:#BF5FFF;--blue:#00BFFF;--text:#E0E0E0;--text-dim:#6B7280;--border:#1E2530;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.logo{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--cyan);text-shadow:0 0 12px #00F5FF88;letter-spacing:2px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:1px}
.nav-pills{display:flex;gap:4px;margin-left:16px}
.nav-pill{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:3px;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;text-decoration:none;transition:all .15s;letter-spacing:.5px}
.nav-pill:hover{border-color:var(--cyan)44;color:var(--text)}
.nav-pill.active{border-color:var(--cyan)66;color:var(--cyan);background:var(--cyan)0f}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.filter-pill{font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:3px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.filter-pill:hover{border-color:var(--cyan)44;color:var(--text)}
.filter-pill.active{border-color:var(--purple)66;color:var(--purple);background:var(--purple)0f}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--cyan)22;border:1px solid var(--cyan)44;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:var(--cyan)}
.main{display:flex;flex:1;overflow:hidden}
/* MAP AREA */
.map-area{flex:1;position:relative;overflow:hidden;background:var(--bg)}
.map-bg{position:absolute;inset:0;background-image:radial-gradient(circle,#1E253022 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
.map-svg{position:absolute;inset:0;width:100%;height:100%}
/* RIGHT PANEL */
.rp{width:0;flex-shrink:0;background:var(--bg-panel);border-left:1px solid var(--border);overflow:hidden;transition:width .25s ease}
.rp.open{width:320px}
.rp-inner{width:320px;padding:18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%}
.rp-inner::-webkit-scrollbar{width:3px}.rp-inner::-webkit-scrollbar-thumb{background:var(--border)}
.panel-close{background:none;border:1px solid var(--border);color:var(--text-dim);width:24px;height:24px;border-radius:3px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;align-self:flex-end}
.panel-close:hover{border-color:var(--red)66;color:var(--red)}
.rp-title{font-family:var(--mono);font-size:14px;color:var(--text);font-weight:500}
.rp-sub{font-size:11px;color:var(--text-dim)}
.rp-section{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.sig-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px}
.sig-item:last-child{border-bottom:none}
.sig-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sig-name{color:var(--text);font-family:var(--mono);font-size:10px}
.sig-score{margin-left:auto;font-family:var(--mono);font-size:10px}
.rp-btn{width:100%;font-family:var(--mono);font-size:10px;letter-spacing:.8px;padding:8px;border-radius:3px;cursor:pointer;transition:all .15s;text-transform:uppercase;text-align:center;border:1px solid;margin-top:4px}
.rp-btn-p{background:var(--cyan)18;color:var(--cyan);border-color:var(--cyan)44}
.rp-btn-p:hover{background:var(--cyan)28;box-shadow:0 0 10px var(--cyan)22}
/* PERIOD BAR */
.period-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:var(--bg-panel)ee;border:1px solid var(--border);border-radius:6px;padding:6px 10px;z-index:10}
.period-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:3px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.period-btn:hover,.period-btn.active{border-color:var(--cyan)66;color:var(--cyan);background:var(--cyan)0f}
/* LEGEND */
.map-legend{position:absolute;top:16px;right:16px;background:var(--bg-panel)ee;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:var(--mono);font-size:10px;z-index:10}
.legend-title{color:var(--text-dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.legend-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.legend-swatch{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.legend-label{color:var(--text-dim)}
/* TOOLTIP */
.tooltip{position:fixed;background:var(--bg-panel);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:11px;color:var(--text);pointer-events:none;z-index:50;min-width:160px;box-shadow:0 4px 20px #00000066;display:none}
.tooltip-title{font-size:12px;font-weight:500;margin-bottom:4px}
.tooltip-row{font-size:10px;color:var(--text-dim);margin-top:2px}
.tooltip-row span{color:var(--text)}
.bottom-bar{height:40px;background:var(--bg-panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.bstat{font-family:var(--mono);font-size:10px;color:var(--text-dim)}
.bstat b{color:var(--cyan)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">◈ Simplex</div>
  <div class="live-dot"></div>
  <span class="live-label">LIVE</span>
  <nav class="nav-pills">
    <a class="nav-pill" href="feed.html">ЛЕНТА</a>
    <a class="nav-pill" href="board.html">ДОСКА</a>
    <a class="nav-pill" href="graph.html">ГРАФ</a>
    <a class="nav-pill active" href="#">КАРТА</a>
    <a class="nav-pill" href="cases.html">КЕЙСЫ</a>
  </nav>
  <div class="topbar-right">
    <button class="filter-pill" id="btnAll" onclick="setFilter('all')">ВСЕ</button>
    <button class="filter-pill active" id="btnDark" onclick="setFilter('dark')">ТОЛЬКО DARKNET</button>
    <button class="filter-pill" id="btnPoints" onclick="togglePoints()">● ТОЧКИ</button>
    <div class="avatar">АН</div>
  </div>
</div>
<div class="main">
  <div class="map-area" id="mapArea">
    <div class="map-bg"></div>
    <svg class="map-svg" id="mapSvg" viewBox="0 0 900 480"></svg>
    <div class="map-legend">
      <div class="legend-title">Риск-индекс</div>
      <div class="legend-row"><div class="legend-swatch" style="background:#FF2D5566"></div><span class="legend-label">Критический (80+)</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#FFB80066"></div><span class="legend-label">Средний (50-79)</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#00FF9F44"></div><span class="legend-label">Низкий (&lt;50)</span></div>
      <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:6px">
      <div class="legend-row"><div style="width:12px;height:12px;border-radius:50%;background:#BF5FFF;flex-shrink:0"></div><span class="legend-label">DarkNet-след</span></div>
      <div class="legend-row"><div style="width:12px;height:12px;border-radius:50%;background:#00BFFF;flex-shrink:0"></div><span class="legend-label">Клирнет</span></div>
      </div>
    </div>
    <div class="period-bar">
      <button class="period-btn" onclick="setPeriod(this)">СЕГОДНЯ</button>
      <button class="period-btn active" onclick="setPeriod(this)">7Д</button>
      <button class="period-btn" onclick="setPeriod(this)">30Д</button>
      <button class="period-btn" onclick="setPeriod(this)">ВСЁ</button>
    </div>
  </div>
  <div class="rp" id="rp"><div class="rp-inner" id="rpInner"></div></div>
</div>
<div class="bottom-bar">
  <span class="bstat">Алматы: <b>94</b></span>
  <span class="bstat">Астана: <b>71</b></span>
  <span class="bstat">Шымкент: <b>58</b></span>
  <span class="bstat">Кызылорда: <b>42</b></span>
  <span class="bstat">Другие: <b>28</b></span>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const REGIONS=[
  {id:'almaty',name:'Алматы',risk:94,dark:true,signals:34,path:'M 520 290 L 580 270 L 600 310 L 570 340 L 520 330 Z',cx:555,cy:308},
  {id:'astana',name:'Астана',risk:71,dark:true,signals:22,path:'M 430 170 L 490 155 L 500 195 L 450 210 L 420 195 Z',cx:458,cy:182},
  {id:'shymkent',name:'Шымкент',risk:58,dark:true,signals:18,path:'M 420 340 L 480 325 L 495 365 L 450 380 L 415 365 Z',cx:455,cy:354},
  {id:'aktobe',name:'Актобе',risk:35,dark:false,signals:9,path:'M 200 190 L 265 175 L 275 215 L 225 230 L 195 215 Z',cx:233,cy:203},
  {id:'karaganda',name:'Караганда',risk:44,dark:false,signals:14,path:'M 380 230 L 440 215 L 450 255 L 405 270 L 375 255 Z',cx:410,cy:243},
  {id:'pavlodar',name:'Павлодар',risk:28,dark:false,signals:7,path:'M 490 130 L 550 115 L 560 155 L 510 170 L 485 155 Z',cx:520,cy:142},
  {id:'semey',name:'Семей',risk:31,dark:false,signals:8,path:'M 580 185 L 640 170 L 650 210 L 600 225 L 575 210 Z',cx:610,cy:198},
  {id:'kyzylorda',name:'Кызылорда',risk:42,dark:true,signals:12,path:'M 320 310 L 380 295 L 390 335 L 345 350 L 315 335 Z',cx:352,cy:323},
  {id:'atyrau',name:'Атырау',risk:25,dark:false,signals:6,path:'M 120 250 L 185 235 L 195 275 L 145 290 L 115 275 Z',cx:155,cy:263},
  {id:'uralsk',name:'Орал',risk:18,dark:false,signals:4,path:'M 165 155 L 230 140 L 240 180 L 190 195 L 160 180 Z',cx:200,cy:168},
];
const POINTS=[
  {x:560,y:295,level:'critical',dark:true,label:'DN-листинг №A41'},
  {x:538,y:318,level:'critical',dark:true,label:'@kz_drop_alm'},
  {x:462,y:186,level:'critical',dark:false,label:'Утечка БД РК'},
  {x:448,y:356,level:'medium',dark:true,label:'drop_shym'},
  {x:348,y:320,level:'medium',dark:true,label:'@kz_alco_opt'},
  {x:415,y:245,level:'medium',dark:false,label:'OLX-оптовик'},
  {x:472,y:170,level:'low',dark:false,label:'@vape_kz'},
];
let filterMode='dark', showPoints=false, selectedRegion=null;
const svg=document.getElementById('mapSvg');

function riskColor(risk, alpha){
  if(risk>=80)return `rgba(255,45,85,${alpha})`;
  if(risk>=50)return `rgba(255,184,0,${alpha})`;
  return `rgba(0,255,159,${alpha})`;
}

function renderMap(){
  svg.innerHTML='';
  // gradient defs
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  // scanlines filter
  const filter=document.createElementNS('http://www.w3.org/2000/svg','filter');
  filter.setAttribute('id','glow');
  const fe=document.createElementNS('http://www.w3.org/2000/svg','feGaussianBlur');
  fe.setAttribute('stdDeviation','3');fe.setAttribute('result','blur');
  const feMerge=document.createElementNS('http://www.w3.org/2000/svg','feMerge');
  ['blur','SourceGraphic'].forEach(v=>{ const n=document.createElementNS('http://www.w3.org/2000/svg','feMergeNode');n.setAttribute('in',v);feMerge.appendChild(n); });
  filter.appendChild(fe);filter.appendChild(feMerge);defs.appendChild(filter);
  svg.appendChild(defs);
  // regions
  REGIONS.forEach(r=>{
    const show=filterMode==='all'||(filterMode==='dark'&&r.dark);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',r.path);
    const alpha=show?0.55:0.12;
    path.setAttribute('fill',riskColor(show?r.risk:20,alpha));
    path.setAttribute('stroke',selectedRegion===r.id?'#00F5FF':r.dark&&show?'#BF5FFF44':'#1E253066');
    path.setAttribute('stroke-width',selectedRegion===r.id?'2':'1');
    if(selectedRegion===r.id) path.setAttribute('filter','url(#glow)');
    // label
    const text=document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',r.cx);text.setAttribute('y',r.cy-6);
    text.setAttribute('text-anchor','middle');text.setAttribute('font-size','9');
    text.setAttribute('font-family','JetBrains Mono');
    text.setAttribute('fill',show?'#E0E0E0':'#6B728055');text.textContent=r.name;
    const scoreText=document.createElementNS('http://www.w3.org/2000/svg','text');
    scoreText.setAttribute('x',r.cx);scoreText.setAttribute('y',r.cy+8);
    scoreText.setAttribute('text-anchor','middle');scoreText.setAttribute('font-size','11');
    scoreText.setAttribute('font-family','JetBrains Mono');scoreText.setAttribute('font-weight','700');
    scoreText.setAttribute('fill',show?riskColor(r.risk,1):'#6B728055');
    scoreText.textContent=show?r.risk:'';
    // darknet badge
    if(r.dark&&show){
      const badge=document.createElementNS('http://www.w3.org/2000/svg','circle');
      badge.setAttribute('cx',r.cx+28);badge.setAttribute('cy',r.cy-8);
      badge.setAttribute('r','4');badge.setAttribute('fill','#BF5FFF');
      badge.setAttribute('opacity','0.8');
      g.appendChild(badge);
    }
    g.appendChild(path);g.appendChild(text);g.appendChild(scoreText);
    g.addEventListener('mouseenter',e=>showTooltip(e,r));
    g.addEventListener('mouseleave',()=>hideTooltip());
    g.addEventListener('click',()=>clickRegion(r.id));
    svg.appendChild(g);
  });
  // points
  if(showPoints){
    POINTS.forEach(p=>{
      if(filterMode==='dark'&&!p.dark)return;
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx',p.x);circle.setAttribute('cy',p.y);
      const r=p.level==='critical'?6:p.level==='medium'?5:4;
      circle.setAttribute('r',r);
      circle.setAttribute('fill',p.dark?'#BF5FFF':'#00BFFF');
      circle.setAttribute('opacity','0.85');
      circle.setAttribute('filter','url(#glow)');
      const pulse=document.createElementNS('http://www.w3.org/2000/svg','circle');
      pulse.setAttribute('cx',p.x);pulse.setAttribute('cy',p.y);pulse.setAttribute('r',r+3);
      pulse.setAttribute('fill','none');pulse.setAttribute('stroke',p.dark?'#BF5FFF':'#00BFFF');
      pulse.setAttribute('stroke-width','1');pulse.setAttribute('opacity','0.4');
      pulse.innerHTML=`<animate attributeName="r" from="${r+2}" to="${r+8}" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.4" to="0" dur="2s" repeatCount="indefinite"/>`;
      g.appendChild(pulse);g.appendChild(circle);
      svg.appendChild(g);
    });
  }
}

function showTooltip(e,r){
  const tip=document.getElementById('tooltip');
  tip.style.display='block';
  tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-8)+'px';
  tip.innerHTML=`<div class="tooltip-title" style="color:${riskColor(r.risk,1)}">${r.name}</div>
    <div class="tooltip-row">Риск-индекс: <span style="color:${riskColor(r.risk,1)}">${r.risk}/100</span></div>
    <div class="tooltip-row">Сигналов: <span>${r.signals}</span></div>
    ${r.dark?'<div class="tooltip-row" style="color:#BF5FFF">DarkNet-след подтверждён</div>':''}`;
}
function hideTooltip(){document.getElementById('tooltip').style.display='none';}

const REGION_SIGNALS={
  almaty:[{l:'critical',n:'@kz_drop_alm',s:94,d:true},{l:'critical',n:'DN-листинг A41',s:91,d:true},{l:'medium',n:'OLX #4821',s:55,d:false}],
  astana:[{l:'critical',n:'Утечка БД РК',s:82,d:true},{l:'medium',n:'@kz_alco_opt',s:55,d:false}],
  shymkent:[{l:'medium',n:'drop_shym_2',s:65,d:true},{l:'medium',n:'Krisha #8821',s:48,d:false}],
  kyzylorda:[{l:'medium',n:'@kz_alco_opt — реклама',s:42,d:true}],
};

function clickRegion(id){
  selectedRegion=selectedRegion===id?null:id;
  renderMap();
  const r=REGIONS.find(x=>x.id===id);
  if(!r||selectedRegion===null){document.getElementById('rp').classList.remove('open');return;}
  document.getElementById('rp').classList.add('open');
  const sigs=REGION_SIGNALS[id]||[];
  const riskC=riskColor(r.risk,1);
  document.getElementById('rpInner').innerHTML=`
    <button class="panel-close" onclick="selectedRegion=null;renderMap();document.getElementById('rp').classList.remove('open')">✕</button>
    <div>
      <div style="font-size:11px;color:var(--text-dim);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">ОБЛАСТЬ</div>
      <div class="rp-title" style="color:${riskC}">${r.name}</div>
      <div class="rp-sub">Риск: <span style="color:${riskC};font-family:var(--mono);font-weight:700">${r.risk}/100</span></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:10px;text-align:center">
        <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--cyan)">${r.signals}</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text-dim)">СИГНАЛОВ</div>
      </div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:10px;text-align:center">
        <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:${r.dark?'var(--purple)':'var(--text-dim)'}">${r.dark?'ДА':'НЕТ'}</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text-dim)">DARKNET</div>
      </div>
    </div>
    ${sigs.length?`<div><div class="rp-section">топ-сигналы</div>${sigs.map(s=>`
      <div class="sig-item">
        <div class="sig-dot" style="background:${s.d?'var(--purple)':'var(--blue)'}"></div>
        <span class="sig-name">${s.n}</span>
        <span class="sig-score" style="color:${s.l==='critical'?'var(--red)':s.l==='medium'?'var(--amber)':'var(--green)'}">${s.s}</span>
      </div>`).join('')}</div>`:''}
    <div>
      <button class="rp-btn rp-btn-p">ФИЛЬТРОВАТЬ ЛЕНТУ</button>
    </div>`;
}

function setFilter(mode){
  filterMode=mode;
  document.getElementById('btnAll').classList.toggle('active',mode==='all');
  document.getElementById('btnDark').classList.toggle('active',mode==='dark');
  renderMap();
}
function togglePoints(){
  showPoints=!showPoints;
  document.getElementById('btnPoints').classList.toggle('active',showPoints);
  renderMap();
}
function setPeriod(btn){
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMap();
}

document.addEventListener('mousemove',e=>{
  const tip=document.getElementById('tooltip');
  if(tip.style.display==='block'){
    tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-8)+'px';
  }
});

renderMap();
</script>
</body>
</html>
