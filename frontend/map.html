<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPLEX — Карта</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090E;--bg-panel:#0B0E16;--bg-card:#0F1420;
  --cyan:#00E5FF;--red:#FF3040;--amber:#FF9200;--green:#00CC7A;
  --purple:#9B6DFF;--blue:#2979FF;
  --text:#E2E8F0;--text-mid:#8899AA;--text-dim:#374151;
  --border:rgba(255,255,255,.065);--border-mid:rgba(255,255,255,.13);
  --mono:'JetBrains Mono',monospace;--display:'Space Grotesk',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--mono);height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* TOPBAR */
.topbar{height:44px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0}
.logo{font-family:var(--display);font-size:14px;font-weight:700;color:var(--text);letter-spacing:2px;padding-right:16px}
.topbar-div{width:1px;height:20px;background:var(--border);margin:0 14px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.live-label{font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:1.2px;margin-left:5px}
.nav-pills{display:flex;gap:0;margin-left:14px}
.nav-pill{font-family:var(--mono);font-size:10px;padding:0 13px;height:44px;line-height:44px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;text-decoration:none;transition:color .15s,border-color .15s;letter-spacing:.8px;display:inline-flex;align-items:center}
.nav-pill:hover{color:var(--text-mid)}
.nav-pill.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:5px}
.filter-pill{font-family:var(--mono);font-size:9px;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:2px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.filter-pill:hover{border-color:var(--border-mid);color:var(--text-mid)}
.filter-pill.active{border-color:rgba(155,109,255,.3);color:var(--purple);background:rgba(155,109,255,.06)}
.avatar{width:28px;height:28px;border-radius:50%;background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--cyan);margin-left:8px}
.main{display:flex;flex:1;overflow:hidden}
/* MAP AREA */
.map-area{flex:1;position:relative;overflow:hidden;background:#0d1320}
.map-bg{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.03) 1px,transparent 1px);background-size:22px 22px;pointer-events:none}
.map-svg{position:absolute;inset:0;width:100%;height:100%}
/* RIGHT PANEL */
.rp{width:0;flex-shrink:0;background:var(--bg-panel);border-left:1px solid var(--border);overflow:hidden;transition:width .22s ease}
.rp.open{width:300px}
.rp-inner{width:300px;padding:15px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%}
.rp-inner::-webkit-scrollbar{width:3px}.rp-inner::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07)}
.panel-close{background:none;border:1px solid var(--border);color:var(--text-dim);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;align-self:flex-end}
.panel-close:hover{border-color:rgba(255,48,64,.3);color:var(--red)}
.rp-title{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:500}
.rp-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
.rp-section{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.sig-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.sig-item:last-child{border-bottom:none}
.sig-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sig-name{color:var(--text);font-family:var(--mono);font-size:9px}
.sig-score{margin-left:auto;font-family:var(--mono);font-size:10px}
.rp-btn{width:100%;font-family:var(--mono);font-size:9px;letter-spacing:.8px;padding:7px;border-radius:2px;cursor:pointer;transition:all .15s;text-transform:uppercase;text-align:center;border:1px solid;margin-top:3px}
.rp-btn-p{background:rgba(0,229,255,.07);color:var(--cyan);border-color:rgba(0,229,255,.25)}
.rp-btn-p:hover{background:rgba(0,229,255,.13)}
/* PERIOD BAR */
.period-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:0;background:rgba(11,14,22,.95);border:1px solid var(--border);border-radius:2px;padding:4px 6px;z-index:10}
.period-btn{font-family:var(--mono);font-size:9px;padding:4px 11px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;letter-spacing:.5px}
.period-btn:hover{color:var(--text-mid)}
.period-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}
/* LEGEND */
.map-legend{position:absolute;top:14px;right:14px;background:rgba(11,14,22,.95);border:1px solid var(--border);border-radius:2px;padding:11px;font-family:var(--mono);font-size:10px;z-index:10}
.legend-title{color:var(--text-dim);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px}
.legend-row{display:flex;align-items:center;gap:7px;padding:2px 0}
.legend-swatch{width:12px;height:12px;border-radius:1px;flex-shrink:0}
.legend-label{color:var(--text-mid);font-size:9px}
/* TOOLTIP */
.tooltip{position:fixed;background:var(--bg-panel);border:1px solid var(--border-mid);border-radius:3px;padding:9px 12px;font-family:var(--mono);font-size:10px;color:var(--text);pointer-events:none;z-index:50;min-width:150px;box-shadow:0 4px 16px rgba(0,0,0,.6);display:none}
.tooltip-title{font-size:11px;font-weight:500;margin-bottom:4px}
.tooltip-row{font-size:9px;color:var(--text-mid);margin-top:2px}
.tooltip-row span{color:var(--text)}
/* BOTTOM BAR */
.bottom-bar{height:32px;background:var(--bg-panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0}
.bstat{font-family:var(--mono);font-size:9px;color:var(--text-dim);padding:0 14px;border-right:1px solid var(--border)}
.bstat:first-child{padding-left:0}
.bstat b{color:var(--cyan)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">SIMPLEX</div>
  <div class="topbar-div"></div>
  <div class="live-dot"></div>
  <span class="live-label">LIVE</span>
  <div class="topbar-div"></div>
  <nav class="nav-pills">
    <a class="nav-pill" href="index.html">ЛЕНТА</a>
    <a class="nav-pill" href="board.html">ДОСКА</a>
    <a class="nav-pill" href="graph.html">ГРАФ</a>
    <a class="nav-pill active" href="#">КАРТА</a>
    <a class="nav-pill" href="cases.html">КЕЙСЫ</a>
  </nav>
  <div class="topbar-right">
    <button class="filter-pill" id="btnAll" onclick="setFilter('all')">ВСЕ</button>
    <button class="filter-pill active" id="btnDark" onclick="setFilter('dark')">ТОЛЬКО DARKNET</button>
    <button class="filter-pill" id="btnPoints" onclick="togglePoints()">● ТОЧКИ</button>
    <div class="avatar">АН</div>
  </div>
</div>
<div class="main">
  <div class="map-area" id="mapArea">
    <div class="map-bg"></div>
    <svg class="map-svg" id="mapSvg" viewBox="0 0 900 480"></svg>
    <div class="map-legend">
      <div class="legend-title">Риск-индекс</div>
      <div class="legend-row"><div class="legend-swatch" style="background:rgba(255,48,64,.4)"></div><span class="legend-label">Критический (80+)</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:rgba(255,146,0,.4)"></div><span class="legend-label">Средний (50-79)</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:rgba(0,204,122,.3)"></div><span class="legend-label">Низкий (&lt;50)</span></div>
      <div style="margin-top:7px;border-top:1px solid var(--border);padding-top:6px">
        <div class="legend-row"><div style="width:10px;height:10px;border-radius:50%;background:var(--purple);flex-shrink:0"></div><span class="legend-label">DarkNet-след</span></div>
        <div class="legend-row"><div style="width:10px;height:10px;border-radius:50%;background:var(--cyan);flex-shrink:0"></div><span class="legend-label">Клирнет</span></div>
      </div>
    </div>
    <div class="period-bar">
      <button class="period-btn" onclick="setPeriod(this)">СЕГОДНЯ</button>
      <button class="period-btn active" onclick="setPeriod(this)">7Д</button>
      <button class="period-btn" onclick="setPeriod(this)">30Д</button>
      <button class="period-btn" onclick="setPeriod(this)">ВСЁ</button>
    </div>
  </div>
  <div class="rp" id="rp"><div class="rp-inner" id="rpInner"></div></div>
</div>
<div class="bottom-bar">
  <span class="bstat">Алматы: <b>94</b></span>
  <span class="bstat">Астана: <b>71</b></span>
  <span class="bstat">Шымкент: <b>58</b></span>
  <span class="bstat">Кызылорда: <b>42</b></span>
  <span class="bstat">Другие: <b>28</b></span>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const REGIONS=[
  {id:'almaty',name:'Алматы',risk:94,dark:true,signals:34,path:'M 520 290 L 580 270 L 600 310 L 570 340 L 520 330 Z',cx:555,cy:308},
  {id:'astana',name:'Астана',risk:71,dark:true,signals:22,path:'M 430 170 L 490 155 L 500 195 L 450 210 L 420 195 Z',cx:458,cy:182},
  {id:'shymkent',name:'Шымкент',risk:58,dark:true,signals:18,path:'M 420 340 L 480 325 L 495 365 L 450 380 L 415 365 Z',cx:455,cy:354},
  {id:'aktobe',name:'Актобе',risk:35,dark:false,signals:9,path:'M 200 190 L 265 175 L 275 215 L 225 230 L 195 215 Z',cx:233,cy:203},
  {id:'karaganda',name:'Караганда',risk:44,dark:false,signals:14,path:'M 380 230 L 440 215 L 450 255 L 405 270 L 375 255 Z',cx:410,cy:243},
  {id:'pavlodar',name:'Павлодар',risk:28,dark:false,signals:7,path:'M 490 130 L 550 115 L 560 155 L 510 170 L 485 155 Z',cx:520,cy:142},
  {id:'semey',name:'Семей',risk:31,dark:false,signals:8,path:'M 580 185 L 640 170 L 650 210 L 600 225 L 575 210 Z',cx:610,cy:198},
  {id:'kyzylorda',name:'Кызылорда',risk:42,dark:true,signals:12,path:'M 320 310 L 380 295 L 390 335 L 345 350 L 315 335 Z',cx:352,cy:323},
  {id:'atyrau',name:'Атырау',risk:25,dark:false,signals:6,path:'M 120 250 L 185 235 L 195 275 L 145 290 L 115 275 Z',cx:155,cy:263},
  {id:'uralsk',name:'Орал',risk:18,dark:false,signals:4,path:'M 165 155 L 230 140 L 240 180 L 190 195 L 160 180 Z',cx:200,cy:168},
];
const POINTS=[
  {x:560,y:295,level:'critical',dark:true,label:'DN-листинг №A41'},
  {x:538,y:318,level:'critical',dark:true,label:'@kz_drop_alm'},
  {x:462,y:186,level:'critical',dark:false,label:'Утечка БД РК'},
  {x:448,y:356,level:'medium',dark:true,label:'drop_shym'},
  {x:348,y:320,level:'medium',dark:true,label:'@kz_alco_opt'},
  {x:415,y:245,level:'medium',dark:false,label:'OLX-оптовик'},
  {x:472,y:170,level:'low',dark:false,label:'@vape_kz'},
];
let filterMode='dark', showPoints=false, selectedRegion=null;
const svg=document.getElementById('mapSvg');

function riskColor(risk,alpha){
  if(risk>=80)return `rgba(255,48,64,${alpha})`;
  if(risk>=50)return `rgba(255,146,0,${alpha})`;
  return `rgba(0,204,122,${alpha})`;
}
function riskHex(risk){
  if(risk>=80)return '#FF3040';
  if(risk>=50)return '#FF9200';
  return '#00CC7A';
}

function renderMap(){
  svg.innerHTML='';
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const filter=document.createElementNS('http://www.w3.org/2000/svg','filter');
  filter.setAttribute('id','glow');
  const fe=document.createElementNS('http://www.w3.org/2000/svg','feGaussianBlur');
  fe.setAttribute('stdDeviation','2.5');fe.setAttribute('result','blur');
  const feMerge=document.createElementNS('http://www.w3.org/2000/svg','feMerge');
  ['blur','SourceGraphic'].forEach(v=>{ const n=document.createElementNS('http://www.w3.org/2000/svg','feMergeNode');n.setAttribute('in',v);feMerge.appendChild(n); });
  filter.appendChild(fe);filter.appendChild(feMerge);defs.appendChild(filter);
  svg.appendChild(defs);
  REGIONS.forEach(r=>{
    const show=filterMode==='all'||(filterMode==='dark'&&r.dark);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',r.path);
    const alpha=show?0.4:0.06;
    path.setAttribute('fill',riskColor(show?r.risk:20,alpha));
    path.setAttribute('stroke',selectedRegion===r.id?'rgba(0,229,255,.6)':r.dark&&show?'rgba(155,109,255,.25)':'rgba(255,255,255,.04)');
    path.setAttribute('stroke-width',selectedRegion===r.id?'1.5':'1');
    if(selectedRegion===r.id) path.setAttribute('filter','url(#glow)');
    const text=document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',r.cx);text.setAttribute('y',r.cy-5);
    text.setAttribute('text-anchor','middle');text.setAttribute('font-size','8');
    text.setAttribute('font-family','JetBrains Mono');
    text.setAttribute('fill',show?'rgba(136,153,170,.8)':'rgba(55,65,81,.5)');text.textContent=r.name;
    const scoreText=document.createElementNS('http://www.w3.org/2000/svg','text');
    scoreText.setAttribute('x',r.cx);scoreText.setAttribute('y',r.cy+8);
    scoreText.setAttribute('text-anchor','middle');scoreText.setAttribute('font-size','11');
    scoreText.setAttribute('font-family','JetBrains Mono');scoreText.setAttribute('font-weight','700');
    scoreText.setAttribute('fill',show?riskHex(r.risk):'rgba(55,65,81,.4)');
    scoreText.textContent=show?r.risk:'';
    if(r.dark&&show){
      const badge=document.createElementNS('http://www.w3.org/2000/svg','circle');
      badge.setAttribute('cx',r.cx+26);badge.setAttribute('cy',r.cy-8);
      badge.setAttribute('r','3');badge.setAttribute('fill','#9B6DFF');
      badge.setAttribute('opacity','0.7');
      g.appendChild(badge);
    }
    g.appendChild(path);g.appendChild(text);g.appendChild(scoreText);
    g.addEventListener('mouseenter',e=>showTooltip(e,r));
    g.addEventListener('mouseleave',()=>hideTooltip());
    g.addEventListener('click',()=>clickRegion(r.id));
    svg.appendChild(g);
  });
  if(showPoints){
    POINTS.forEach(p=>{
      if(filterMode==='dark'&&!p.dark)return;
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx',p.x);circle.setAttribute('cy',p.y);
      const r=p.level==='critical'?5:p.level==='medium'?4:3;
      circle.setAttribute('r',r);
      circle.setAttribute('fill',p.dark?'#9B6DFF':'#00E5FF');
      circle.setAttribute('opacity','0.8');
      circle.setAttribute('filter','url(#glow)');
      const pulse=document.createElementNS('http://www.w3.org/2000/svg','circle');
      pulse.setAttribute('cx',p.x);pulse.setAttribute('cy',p.y);pulse.setAttribute('r',r+3);
      pulse.setAttribute('fill','none');pulse.setAttribute('stroke',p.dark?'#9B6DFF':'#00E5FF');
      pulse.setAttribute('stroke-width','1');pulse.setAttribute('opacity','0.3');
      pulse.innerHTML=`<animate attributeName="r" from="${r+2}" to="${r+7}" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite"/>`;
      g.appendChild(pulse);g.appendChild(circle);
      svg.appendChild(g);
    });
  }
}

function showTooltip(e,r){
  const tip=document.getElementById('tooltip');
  tip.style.display='block';
  tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-8)+'px';
  tip.innerHTML=`<div class="tooltip-title" style="color:${riskHex(r.risk)}">${r.name}</div>
    <div class="tooltip-row">Риск-индекс: <span style="color:${riskHex(r.risk)}">${r.risk}/100</span></div>
    <div class="tooltip-row">Сигналов: <span>${r.signals}</span></div>
    ${r.dark?'<div class="tooltip-row" style="color:#9B6DFF">DarkNet-след подтверждён</div>':''}`;
}
function hideTooltip(){document.getElementById('tooltip').style.display='none';}

const REGION_SIGNALS={
  almaty:[{l:'critical',n:'@kz_drop_alm',s:94,d:true},{l:'critical',n:'DN-листинг A41',s:91,d:true},{l:'medium',n:'OLX #4821',s:55,d:false}],
  astana:[{l:'critical',n:'Утечка БД РК',s:82,d:true},{l:'medium',n:'@kz_alco_opt',s:55,d:false}],
  shymkent:[{l:'medium',n:'drop_shym_2',s:65,d:true},{l:'medium',n:'Krisha #8821',s:48,d:false}],
  kyzylorda:[{l:'medium',n:'@kz_alco_opt — реклама',s:42,d:true}],
};

function clickRegion(id){
  selectedRegion=selectedRegion===id?null:id;
  renderMap();
  const r=REGIONS.find(x=>x.id===id);
  if(!r||selectedRegion===null){document.getElementById('rp').classList.remove('open');return;}
  document.getElementById('rp').classList.add('open');
  const sigs=REGION_SIGNALS[id]||[];
  const riskC=riskHex(r.risk);
  document.getElementById('rpInner').innerHTML=`
    <button class="panel-close" onclick="selectedRegion=null;renderMap();document.getElementById('rp').classList.remove('open')">✕</button>
    <div>
      <div style="font-size:9px;color:var(--text-dim);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px">ОБЛАСТЬ</div>
      <div class="rp-title" style="color:${riskC}">${r.name}</div>
      <div class="rp-sub">Риск: <span style="color:${riskC};font-weight:700">${r.risk}/100</span></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div style="background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:2px;padding:10px;text-align:center">
        <div style="font-family:var(--mono);font-size:17px;font-weight:700;color:var(--cyan)">${r.signals}</div>
        <div style="font-family:var(--mono);font-size:8px;color:var(--text-dim);letter-spacing:.5px">СИГНАЛОВ</div>
      </div>
      <div style="background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:2px;padding:10px;text-align:center">
        <div style="font-family:var(--mono);font-size:17px;font-weight:700;color:${r.dark?'var(--purple)':'var(--text-dim)'}">${r.dark?'ДА':'НЕТ'}</div>
        <div style="font-family:var(--mono);font-size:8px;color:var(--text-dim);letter-spacing:.5px">DARKNET</div>
      </div>
    </div>
    ${sigs.length?`<div><div class="rp-section">топ-сигналы</div>${sigs.map(s=>`
      <div class="sig-item">
        <div class="sig-dot" style="background:${s.d?'var(--purple)':'var(--cyan)'}"></div>
        <span class="sig-name">${s.n}</span>
        <span class="sig-score" style="color:${s.l==='critical'?'var(--red)':s.l==='medium'?'var(--amber)':'var(--green)'}">${s.s}</span>
      </div>`).join('')}</div>`:''}
    <div>
      <button class="rp-btn rp-btn-p">ФИЛЬТРОВАТЬ ЛЕНТУ</button>
    </div>`;
}

function setFilter(mode){
  filterMode=mode;
  document.getElementById('btnAll').classList.toggle('active',mode==='all');
  document.getElementById('btnDark').classList.toggle('active',mode==='dark');
  renderMap();
}
function togglePoints(){
  showPoints=!showPoints;
  document.getElementById('btnPoints').classList.toggle('active',showPoints);
  renderMap();
}
function setPeriod(btn){
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMap();
}
document.addEventListener('mousemove',e=>{
  const tip=document.getElementById('tooltip');
  if(tip.style.display==='block'){
    tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-8)+'px';
  }
});
renderMap();
</script>
</body>
</html>
