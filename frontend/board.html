<style>
:root{
  --wood:#3E200A;
  --wood-light:#5C3311;
  --cork:#BF8E4A;
  --string:#CC1500;
  --pin:#9B1010;
  --text:#1A1A1A;
  --text-mid:#555;
  --text-light:#888;
  --card-bg:#FAFAF8;
  --dark-bg:#161B22;
  --dark-panel:#0D1117;
  --dark-border:#30363D;
  --dark-text:#E6EDF3;
  --dark-mid:#8B949E;
  --dark-dim:#484F58;
  --accent:#2F81F7;
  --accent-bright:#58A6FF;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
  --display:'Space Grotesk',sans-serif
}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--wood);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{
  height:44px;
  background:#111318;
  border-bottom:1px solid #222;
  display:flex;
  align-items:center;
  padding:0 18px;
  gap:0;
  flex-shrink:0;
  z-index:50
}
.back-btn{
  font-family:var(--mono);font-size:10px;
  color:#666;text-decoration:none;letter-spacing:.8px;
  padding:5px 10px;border:1px solid #333;border-radius:3px;
  transition:color .15s,border-color .15s
}
.back-btn:hover{color:#ccc;border-color:#555}
.topbar-sep{width:1px;height:20px;background:#333;margin:0 14px;flex-shrink:0}
.breadcrumb{font-family:var(--sans);font-size:13px;color:#ccc;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px}
.bc-type{color:#555}
.bc-sep{color:#444;margin:0 7px}
.bc-name{color:#E6EDF3}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:#3FB950;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.live-label{font-family:var(--mono);font-size:9px;color:#3FB950;letter-spacing:1.2px}
.avatar{width:28px;height:28px;border-radius:3px;background:rgba(47,129,247,.12);border:1px solid rgba(47,129,247,.25);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:#58A6FF;margin-left:8px}

/* ── BOARD OUTER (wood frame) ── */
.board-outer{
  flex:1;
  padding:18px;
  background:linear-gradient(160deg,#5C3311 0%,#3E200A 40%,#4A2A0F 70%,#5A3010 100%);
  box-shadow:inset 0 0 80px rgba(0,0,0,.5);
  overflow:hidden;
  position:relative
}

/* ── CORK ── */
.board-cork{
  width:100%;height:100%;
  position:relative;overflow:hidden;
  background-color:#C09050;
  background-image:
    radial-gradient(ellipse 80px 60px at 12% 18%,rgba(210,165,80,.45),transparent),
    radial-gradient(ellipse 120px 80px at 65% 12%,rgba(165,115,35,.3),transparent),
    radial-gradient(ellipse 60px 100px at 88% 55%,rgba(195,148,60,.35),transparent),
    radial-gradient(ellipse 140px 70px at 25% 78%,rgba(180,130,45,.3),transparent),
    radial-gradient(ellipse 50px 60px at 55% 88%,rgba(215,175,85,.2),transparent),
    radial-gradient(ellipse 90px 50px at 40% 45%,rgba(155,105,30,.18),transparent);
  box-shadow:inset 0 0 40px rgba(0,0,0,.22),inset 2px 2px 10px rgba(255,255,255,.04)
}

/* ── SVG STRINGS ── */
.strings-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;z-index:2
}

/* ── CARDS LAYER ── */
.cards-layer{position:absolute;inset:0;z-index:3}

/* ── BOARD CARD ── */
.board-card{
  position:absolute;
  width:158px;
  padding:28px 12px 12px;
  border-radius:2px;
  cursor:pointer;
  box-shadow:2px 3px 10px rgba(0,0,0,.28),0 1px 4px rgba(0,0,0,.18);
  transition:box-shadow .2s;
  user-select:none;
  background:var(--card-bg)
}
.board-card:hover{box-shadow:4px 6px 18px rgba(0,0,0,.36)}
.board-card.selected{box-shadow:0 0 0 2px var(--accent),4px 6px 18px rgba(0,0,0,.4);z-index:10}
.board-card.dragging{box-shadow:6px 10px 28px rgba(0,0,0,.48);z-index:20;cursor:grabbing;transition:none}

/* card type backgrounds */
.ct-person{background:#FAFAF8}
.ct-telegram{background:#F0F6FF}
.ct-wallet{background:#FFFEF0}
.ct-darknet{background:#1C1C1C}
.ct-listing{background:#FFFDE8}
.ct-phone{background:#F2FFF5}

/* left accent bar */
.board-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
.ct-person::before{background:#999}
.ct-telegram::before{background:#2979FF}
.ct-wallet::before{background:#C8960A}
.ct-darknet::before{background:#9B6DFF}
.ct-listing::before{background:#D4860A}
.ct-phone::before{background:#1A7A40}

/* PIN */
.card-pin{
  position:absolute;
  top:-9px;left:50%;transform:translateX(-50%);
  width:16px;height:16px;
  border-radius:50%;
  background:radial-gradient(circle at 33% 28%,#E83030,#8C0E0E);
  box-shadow:0 2px 5px rgba(0,0,0,.45);
  z-index:5
}
.card-pin::after{
  content:'';
  position:absolute;
  width:3px;height:9px;
  background:linear-gradient(180deg,#888,#333);
  bottom:-7px;left:50%;transform:translateX(-50%);
  border-radius:0 0 2px 2px
}

/* card content */
.card-type-label{
  font-family:var(--mono);font-size:8px;color:#999;
  letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px
}
.ct-darknet .card-type-label{color:#555}

.card-name{
  font-family:var(--display);font-size:12px;font-weight:600;
  color:#1A1A1A;margin-bottom:3px;line-height:1.35;word-break:break-all
}
.ct-darknet .card-name{color:#E2E2E2}

.card-sub{
  font-family:var(--sans);font-size:10px;color:#666;
  margin-bottom:8px;line-height:1.35
}
.ct-darknet .card-sub{color:#777}

.card-risk{
  display:inline-block;font-family:var(--mono);
  font-size:11px;font-weight:700;
  padding:2px 6px;border-radius:2px
}
.risk-c{color:#CC2200;background:rgba(204,34,0,.08)}
.risk-m{color:#A06000;background:rgba(160,96,0,.08)}
.risk-l{color:#1A7A40;background:rgba(26,122,64,.08)}
.ct-darknet .risk-c{color:#FF6B6B;background:rgba(255,107,107,.12)}
.ct-darknet .risk-m{color:#FFB84D;background:rgba(255,184,77,.12)}
.ct-darknet .risk-l{color:#6EE7A0;background:rgba(110,231,160,.1)}

/* ── EMPTY STATE ── */
.empty-note{
  display:none;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#FAFAF8;width:250px;
  padding:32px 24px 24px;border-radius:2px;
  box-shadow:3px 4px 16px rgba(0,0,0,.3);
  text-align:center;z-index:5
}
.empty-note.show{display:block}
.empty-note .card-pin{left:50%;top:-9px}
.empty-note-title{font-family:var(--display);font-size:15px;font-weight:600;color:#1A1A1A;margin-bottom:8px}
.empty-note-sub{font-family:var(--sans);font-size:11px;color:#666;line-height:1.6;margin-bottom:18px}
.empty-note-link{
  font-family:var(--mono);font-size:10px;
  color:var(--accent);text-decoration:none;letter-spacing:.5px;
  padding:6px 14px;border:1px solid rgba(47,129,247,.3);
  border-radius:3px;display:inline-block;transition:all .15s
}
.empty-note-link:hover{background:rgba(47,129,247,.08)}

/* ── DETAIL PANEL ── */
.detail-panel{
  position:fixed;right:0;top:44px;bottom:0;
  width:0;background:var(--dark-bg);
  border-left:1px solid var(--dark-border);
  overflow:hidden;transition:width .25s cubic-bezier(.4,0,.2,1);
  z-index:40
}
.detail-panel.open{width:320px}
.panel-scroll{
  width:320px;height:100%;
  overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:14px
}
.panel-scroll::-webkit-scrollbar{width:4px}
.panel-scroll::-webkit-scrollbar-thumb{background:var(--dark-border);border-radius:4px}

.panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.panel-close{
  background:none;border:1px solid var(--dark-border);
  color:var(--dark-mid);width:24px;height:24px;border-radius:3px;
  cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;margin-top:2px;font-family:var(--mono)
}
.panel-close:hover{border-color:rgba(248,81,73,.4);color:#F85149}

.panel-entity-type{font-family:var(--mono);font-size:9px;color:var(--dark-dim);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px}
.panel-entity-name{font-family:var(--display);font-size:16px;font-weight:600;color:var(--dark-text);line-height:1.3}
.panel-entity-sub{font-family:var(--sans);font-size:12px;color:var(--dark-mid);margin-top:3px}

.panel-section{
  font-family:var(--mono);font-size:9px;color:var(--dark-dim);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:8px;padding-bottom:6px;
  border-bottom:1px solid var(--dark-border)

.panel-risk-val{font-family:var(--mono);font-size:32px;font-weight:700;line-height:1}
.panel-risk-sub{font-family:var(--mono);font-size:12px;color:var(--dark-dim)}

.conn-list{display:flex;flex-direction:column;gap:0}
.conn-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 0;border-bottom:1px solid var(--dark-border)

.conn-item:last-child{border-bottom:none}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.conn-name{font-family:var(--mono);font-size:10px;color:var(--dark-text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.panel-btn{
  width:100%;font-family:var(--mono);font-size:9px;
  letter-spacing:.8px;padding:9px;border-radius:3px;cursor:pointer;
  transition:all .15s;text-transform:uppercase;border:1px solid

        {from:'e1',to:'e2',label:'публикация'},
        {from:'e1',to:'e3',label:'образец'},
      ]
    },
    'CASE-004': {
      title: 'Операция «КЛАДКИ»',
      subtitle: 'Средний · Кызылорда · Наркотики',
      entities: [
        {id:'e1',type:'telegram',name:'@kzo_zakladki',  sub:'Закладки · Кызылорда',    risk:55, x:250, y:170},
        {id:'e2',type:'person',  name:'anon_kzo',       sub:'Не установлен',           risk:42, x:500, y:140},
        {id:'e3',type:'listing', name:'Паттерны перепис.',sub:'Косвенные улики',       risk:35, x:370, y:335},
      ],
      connections: [
        {from:'e1',to:'e2',label:'предполагаемый'},
        {from:'e1',to:'e3',label:'источник'},
      ]
    },
    'CASE-005': {
      title: 'Операция «АЛКО»',
      subtitle: 'Низкий · Алматинская обл. · Контрабанда',
      entities: [
        {id:'e1',type:'listing', name:'OLX #6100',      sub:'Алкоголь без лицензии',  risk:38, x:280, y:175},
        {id:'e2',type:'person',  name:'opt_alco_kz',    sub:'Продавец · закрыт',      risk:38, x:530, y:155},
      ],
      connections: [
        {from:'e1',to:'e2',label:'продавец'},
      ]
    },
  }
};

/* ─────────────────────────── STATE ─────────────────────────── */
let currentData = null;
let selectedId   = null;
let dragging     = null;
let dragMoved    = false;
let dragStartX, dragStartY, dragOrigX, dragOrigY;

/* ─────────────────────────── INIT ─────────────────────────── */
function init() {
  const p   = new URLSearchParams(location.search);
  const sid = p.get('signal');
  const cid = p.get('case');

  if (sid && BOARD_DATA.signals[sid]) {
    currentData = BOARD_DATA.signals[sid];
    setBreadcrumb('Сигнал', currentData.title);
  } else if (cid && BOARD_DATA.cases[cid]) {
    currentData = BOARD_DATA.cases[cid];
    setBreadcrumb('Кейс', currentData.title);
  } else {
    document.getElementById('emptyNote').classList.add('show');
    return;
  }

  assignRotations();
  renderBoard();
}

function assignRotations() {
  currentData.entities.forEach((e, i) => {
    if (e.rot === undefined) e.rot = ROTATIONS[i % ROTATIONS.length];
  });
}

function setBreadcrumb(type, name) {
  document.getElementById('breadcrumb').innerHTML =
    `<span class="bc-type">${type}</span><span class="bc-sep">›</span><span class="bc-name">${name}</span>`;
  document.title = `SIMPLEX — ${name}`;
}

/* ─────────────────────────── RENDER ─────────────────────────── */
function renderBoard() {
  renderCards();
  renderStrings();
}

function renderCards() {
  const layer = document.getElementById('cardsLayer');
  layer.innerHTML = '';
  currentData.entities.forEach((entity, i) => {
    const el = document.createElement('div');
    el.className = `board-card ct-${entity.type}${entity.id === selectedId ? ' selected' : ''}`;
    el.style.left      = entity.x + 'px';
    el.style.top       = entity.y + 'px';
    el.style.transform = `rotate(${entity.rot}deg)`;
    el.dataset.id      = entity.id;

    const rc = entity.risk >= 75 ? 'c' : entity.risk >= 45 ? 'm' : 'l';

    el.innerHTML = `
      <div class="card-pin"></div>
      <div class="card-type-label">${TYPE_LABELS[entity.type] || entity.type}</div>
      <div class="card-name">${entity.name}</div>
      ${entity.sub ? `<div class="card-sub">${entity.sub}</div>` : ''}
      <div class="card-risk risk-${rc}">${entity.risk}</div>
    `;

    el.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.stopPropagation();
      dragMoved    = false;
      dragging     = {entity, el};
      dragStartX   = e.clientX;
      dragStartY   = e.clientY;
      dragOrigX    = entity.x;
      dragOrigY    = entity.y;
      el.classList.add('dragging');
      e.preventDefault();
    });

    layer.appendChild(el);
  });
}

function renderStrings() {
  const svg = document.getElementById('stringsSvg');
  svg.innerHTML = '';

  /* defs: arrowhead (optional, keep for cleanliness) */
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);

  currentData.connections.forEach(conn => {
    const from = currentData.entities.find(e => e.id === conn.from);
    const to   = currentData.entities.find(e => e.id === conn.to);
    if (!from || !to) return;

    /* attach string to pin center (top-center of card) */
    const x1 = from.x + CARD_W / 2;
    const y1 = from.y + 1;
    const x2 = to.x   + CARD_W / 2;
    const y2 = to.y   + 1;

    const dist = Math.hypot(x2 - x1, y2 - y1);
    const sag  = Math.min(dist * 0.18, 55);
    const cx   = (x1 + x2) / 2;
    const cy   = (y1 + y2) / 2 + sag;

    /* string */
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} Q${cx},${cy} ${x2},${y2}`);
    path.setAttribute('stroke', '#CC1500');
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.72');
    svg.appendChild(path);

    /* pin dots at endpoints */
    [[x1,y1],[x2,y2]].forEach(([px,py]) => {
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', px);
      c.setAttribute('cy', py);
      c.setAttribute('r',  '3.5');
      c.setAttribute('fill', '#9B1010');
      svg.appendChild(c);
    });
  });
}

/* ─────────────────────────── DRAG ─────────────────────────── */
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
  if (!dragMoved) return;
  dragging.entity.x = dragOrigX + dx;
  dragging.entity.y = dragOrigY + dy;
  dragging.el.style.left = dragging.entity.x + 'px';
  dragging.el.style.top  = dragging.entity.y + 'px';
  renderStrings();
});

document.addEventListener('mouseup', e => {
  if (!dragging) return;
  const el     = dragging.el;
  const entity = dragging.entity;
  el.classList.remove('dragging');
  const moved = dragMoved;
  dragging  = null;
  dragMoved = false;
  if (!moved) openPanel(entity);
});

/* click on cork background → close panel */
document.addEventListener('click', e => {
  if (!e.target.closest('.board-card') && !e.target.closest('#detailPanel')) {
    closePanel();
  }
});

/* ─────────────────────────── PANEL ─────────────────────────── */
function openPanel(entity) {
  selectedId = entity.id;
  document.querySelectorAll('.board-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.id === entity.id);
  });

  const riskColor = entity.risk >= 75 ? '#F85149' : entity.risk >= 45 ? '#D29922' : '#3FB950';
  const rc        = entity.risk >= 75 ? 'c' : entity.risk >= 45 ? 'm' : 'l';
  const riskLabel = entity.risk >= 75 ? 'Критический' : entity.risk >= 45 ? 'Средний' : 'Низкий';
  const dotColor  = TYPE_DOT_COLORS[entity.type] || '#888';

  const conns = currentData.connections.filter(c => c.from === entity.id || c.to === entity.id);

  const connItems = conns.map(c => {
    const otherId = c.from === entity.id ? c.to : c.from;
    const other   = currentData.entities.find(e => e.id === otherId);
    if (!other) return '';
    return `<div class="conn-item">
      <div class="conn-dot" style="background:${TYPE_DOT_COLORS[other.type]||'#888'}"></div>
      <span class="conn-name">${other.name}</span>
      <span class="conn-label">${c.label}</span>
    </div>`;
  }).join('');

  document.getElementById('panelScroll').innerHTML = `
    <div class="panel-head">
      <div>
        <div class="panel-entity-type">${TYPE_LABELS[entity.type] || entity.type}</div>
        <div class="panel-entity-name">${entity.name}</div>
        ${entity.sub ? `<div class="panel-entity-sub">${entity.sub}</div>` : ''}
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>

    <div>
      <div class="panel-section">Риск-балл</div>
      <div class="panel-risk-val" style="color:${riskColor}">${entity.risk}<span class="panel-risk-sub"> / 100 · ${riskLabel}</span></div>
    </div>

    ${conns.length ? `<div>
      <div class="panel-section">Связи (${conns.length})</div>
      <div class="conn-list">${connItems}</div>
    </div>` : ''}

    <div style="display:flex;flex-direction:column;gap:6px;margin-top:auto">
      <button class="panel-btn panel-btn-g" onclick="closePanel()">Закрыть</button>
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');
}

function closePanel() {
  selectedId = null;
  document.querySelectorAll('.board-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('detailPanel').classList.remove('open');
}

/* ─────────────────────────── START ─────────────────────────── */
init();
</script>
