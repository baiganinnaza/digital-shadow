<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPLEX — Кейсы</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090E;--bg-panel:#0B0E16;--bg-card:#0F1420;
  --cyan:#00E5FF;--red:#FF3040;--amber:#FF9200;--green:#00CC7A;
  --purple:#9B6DFF;--blue:#2979FF;
  --text:#E2E8F0;--text-mid:#8899AA;--text-dim:#374151;
  --border:rgba(255,255,255,.065);--border-mid:rgba(255,255,255,.13);
  --mono:'JetBrains Mono',monospace;--display:'Space Grotesk',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--mono);height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* TOPBAR */
.topbar{height:44px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0}
.logo{font-family:var(--display);font-size:14px;font-weight:700;color:var(--text);letter-spacing:2px;padding-right:16px}
.topbar-div{width:1px;height:20px;background:var(--border);margin:0 14px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.live-label{font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:1.2px;margin-left:5px}
.nav-pills{display:flex;gap:0;margin-left:14px}
.nav-pill{font-family:var(--mono);font-size:10px;padding:0 13px;height:44px;line-height:44px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;text-decoration:none;transition:color .15s,border-color .15s;letter-spacing:.8px;display:inline-flex;align-items:center}
.nav-pill:hover{color:var(--text-mid)}
.nav-pill.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.new-case-btn{font-family:var(--mono);font-size:9px;padding:5px 12px;background:var(--cyan);color:#07090E;border:none;border-radius:2px;cursor:pointer;font-weight:700;letter-spacing:.8px;transition:opacity .15s}
.new-case-btn:hover{opacity:.88}
.avatar{width:28px;height:28px;border-radius:50%;background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--cyan)}
.main{display:flex;flex:1;overflow:hidden}
/* CASES LIST */
.cases-list{width:330px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.cases-toolbar{padding:10px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.cases-title{font-family:var(--mono);font-size:11px;color:var(--text-mid);letter-spacing:1.2px}
.cases-count-badge{background:rgba(0,229,255,.07);color:var(--cyan);font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:10px;margin-left:auto}
.status-filters{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sf-btn{font-family:var(--mono);font-size:9px;padding:7px 11px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;letter-spacing:.5px}
.sf-btn:hover{color:var(--text-mid)}
.sf-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.cases-scroll{flex:1;overflow-y:auto;padding:7px}
.cases-scroll::-webkit-scrollbar{width:3px}.cases-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07)}
/* CASE CARD */
.case-card{background:rgba(255,255,255,.015);border:1px solid var(--border);border-radius:2px;padding:11px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;border-left:2px solid var(--border)}
.case-card:hover{border-color:var(--border-mid)}
.case-card.active{border-color:rgba(0,229,255,.25)!important;background:rgba(0,229,255,.02)}
.case-card.status-open{border-left-color:var(--red)}
.case-card.status-progress{border-left-color:var(--amber)}
.case-card.status-closed{border-left-color:var(--green)}
.case-card-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.case-id{font-family:var(--mono);font-size:9px;color:var(--text-dim)}
.case-status{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:1px;text-transform:uppercase;margin-left:auto}
.case-status.open{background:rgba(255,48,64,.1);color:var(--red);border:1px solid rgba(255,48,64,.2)}
.case-status.progress{background:rgba(255,146,0,.1);color:var(--amber);border:1px solid rgba(255,146,0,.2)}
.case-status.closed{background:rgba(0,204,122,.1);color:var(--green);border:1px solid rgba(0,204,122,.2)}
.case-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px}
.case-desc{font-size:10px;color:var(--text-mid);margin-bottom:8px}
.case-meta{display:flex;gap:8px;align-items:center}
.case-meta-item{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:var(--text-dim)}
.case-dot{width:6px;height:6px;border-radius:50%}
.case-priority{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:1px;margin-left:auto}
.prio-critical{background:rgba(255,48,64,.1);color:var(--red)}
.prio-medium{background:rgba(255,146,0,.1);color:var(--amber)}
.prio-low{background:rgba(0,204,122,.1);color:var(--green)}
/* CASE DETAIL */
.case-detail{flex:1;display:flex;flex-direction:column;overflow:hidden}
.detail-header{padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.detail-case-id{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1.2px;margin-bottom:4px}
.detail-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:5px}
.detail-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.detail-meta-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--text-dim)}
.detail-content{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:17px}
.detail-content::-webkit-scrollbar{width:3px}.detail-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07)}
.section-title{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
/* EVIDENCE */
.evidence-item{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:2px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px}
.ev-icon{font-size:14px;flex-shrink:0;margin-top:1px;color:var(--text-mid)}
.ev-title{font-family:var(--mono);font-size:10px;color:var(--text);margin-bottom:2px}
.ev-desc{font-size:10px;color:var(--text-mid);margin-bottom:5px}
.ev-tags{display:flex;gap:4px;flex-wrap:wrap}
.ev-tag{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:1px}
.ev-tag-dark{background:rgba(155,109,255,.1);color:var(--purple);border:1px solid rgba(155,109,255,.2)}
.ev-tag-clear{background:rgba(41,121,255,.1);color:var(--blue);border:1px solid rgba(41,121,255,.2)}
.ev-tag-time{background:rgba(255,255,255,.04);color:var(--text-dim);border:1px solid var(--border)}
/* TIMELINE */
.timeline-item{display:flex;gap:12px;padding-bottom:14px;position:relative}
.timeline-item::before{content:'';position:absolute;left:6px;top:14px;bottom:0;width:1px;background:var(--border)}
.timeline-item:last-child::before{display:none}
.tl-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;margin-top:2px;border:2px solid var(--bg-panel)}
.tl-content{flex:1}
.tl-time{font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-bottom:2px}
.tl-text{font-size:10px;color:var(--text-mid)}
/* SUSPECTS */
.suspect-item{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:2px;padding:9px 13px;margin-bottom:5px;display:flex;align-items:center;gap:10px}
.susp-icon{font-size:13px;color:var(--text-mid)}
.susp-name{font-family:var(--mono);font-size:10px;color:var(--text)}
.susp-role{font-size:9px;color:var(--text-dim)}
.susp-risk{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:700}
/* ACTIONS */
.detail-actions{padding:13px 22px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.act-btn{font-family:var(--mono);font-size:9px;letter-spacing:.7px;padding:7px 14px;border-radius:2px;cursor:pointer;transition:all .15s;text-transform:uppercase;border:1px solid}
.act-btn-p{background:rgba(0,229,255,.07);color:var(--cyan);border-color:rgba(0,229,255,.25)}
.act-btn-p:hover{background:rgba(0,229,255,.13)}
.act-btn-a{background:rgba(255,146,0,.07);color:var(--amber);border-color:rgba(255,146,0,.25)}
.act-btn-a:hover{background:rgba(255,146,0,.13)}
.act-btn-g{background:rgba(0,204,122,.07);color:var(--green);border-color:rgba(0,204,122,.25)}
.act-btn-g:hover{background:rgba(0,204,122,.13)}
.act-btn-d{background:transparent;color:var(--text-dim);border-color:var(--border)}
.act-btn-d:hover{color:var(--text-mid);border-color:var(--border-mid)}
/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);font-family:var(--mono);font-size:11px;gap:10px}
.empty-state-icon{font-size:36px;opacity:.15}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-panel);border:1px solid var(--border-mid);border-radius:3px;padding:22px;width:400px;display:flex;flex-direction:column;gap:13px;box-shadow:0 16px 48px rgba(0,0,0,.8)}
.modal-title{font-family:var(--mono);font-size:11px;color:var(--cyan);letter-spacing:1.2px}
.modal-field{display:flex;flex-direction:column;gap:5px}
.modal-label{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.modal-input,.modal-select,.modal-textarea{background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;border-radius:2px;outline:none;transition:border-color .15s}
.modal-input:focus,.modal-select:focus,.modal-textarea:focus{border-color:rgba(0,229,255,.3)}
.modal-textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:7px;justify-content:flex-end}
.modal-btn{font-family:var(--mono);font-size:9px;letter-spacing:.8px;padding:7px 14px;border-radius:2px;cursor:pointer;transition:all .15s;text-transform:uppercase;border:1px solid}
.modal-btn-p{background:var(--cyan);color:#07090E;border-color:var(--cyan);font-weight:700}
.modal-btn-c{background:transparent;color:var(--text-dim);border-color:var(--border)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">SIMPLEX</div>
  <div class="topbar-div"></div>
  <div class="live-dot"></div>
  <span class="live-label">LIVE</span>
  <div class="topbar-div"></div>
  <nav class="nav-pills">
    <a class="nav-pill" href="index.html">ЛЕНТА</a>
    <a class="nav-pill" href="board.html">ДОСКА</a>
    <a class="nav-pill" href="graph.html">ГРАФ</a>
    <a class="nav-pill" href="map.html">КАРТА</a>
    <a class="nav-pill active" href="#">КЕЙСЫ</a>
  </nav>
  <div class="topbar-right">
    <button class="new-case-btn" onclick="document.getElementById('modal').classList.add('show')">+ НОВЫЙ КЕЙС</button>
    <div class="avatar">АН</div>
  </div>
</div>
<div class="main">
  <div class="cases-list">
    <div class="cases-toolbar">
      <span class="cases-title">КЕЙСЫ</span>
      <span class="cases-count-badge" id="casesCount">5</span>
    </div>
    <div class="status-filters">
      <button class="sf-btn active" onclick="filterCases('all',this)">ВСЕ</button>
      <button class="sf-btn" onclick="filterCases('open',this)">ОТКРЫТЫ</button>
      <button class="sf-btn" onclick="filterCases('progress',this)">В РАБОТЕ</button>
      <button class="sf-btn" onclick="filterCases('closed',this)">ЗАКРЫТЫ</button>
    </div>
    <div class="cases-scroll" id="casesList"></div>
  </div>
  <div class="case-detail" id="caseDetail">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">▤</div>
      <div>Выберите кейс для просмотра</div>
      <div style="font-size:9px;color:var(--text-dim)">Или создайте новый</div>
    </div>
    <div id="caseDetailContent" style="display:none;flex:1;overflow:hidden;flex-direction:column;"></div>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">+ НОВЫЙ КЕЙС</div>
    <div class="modal-field">
      <label class="modal-label">Название</label>
      <input class="modal-input" id="newTitle" placeholder="Название кейса...">
    </div>
    <div class="modal-field">
      <label class="modal-label">Описание</label>
      <textarea class="modal-textarea" id="newDesc" placeholder="Что известно на данный момент..."></textarea>
    </div>
    <div style="display:flex;gap:10px">
      <div class="modal-field" style="flex:1">
        <label class="modal-label">Приоритет</label>
        <select class="modal-select" id="newPriority">
          <option value="critical">Критический</option>
          <option value="medium">Средний</option>
          <option value="low">Низкий</option>
        </select>
      </div>
      <div class="modal-field" style="flex:1">
        <label class="modal-label">Категория</label>
        <select class="modal-select" id="newCat">
          <option>Наркотики</option>
          <option>Контрабанда</option>
          <option>Крипто</option>
          <option>Утечки</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-c" onclick="document.getElementById('modal').classList.remove('show')">ОТМЕНА</button>
      <button class="modal-btn modal-btn-p" onclick="createCase()">СОЗДАТЬ КЕЙС</button>
    </div>
  </div>
</div>
<script>
let CASES=[
  {id:'CASE-001',title:'Операция «ФАНТОМ»',desc:'Сеть сбыта запрещённых веществ через Telegram и DarkNet',status:'open',priority:'critical',cat:'Наркотики',region:'Алматы',date:'20 июн 2026',updated:'2 ч назад',signals:3,
    evidence:[
      {icon:'◈',title:'Telegram @kz_drop_alm',desc:'Риск 94 · 1,240 подписчиков · предлагает метамфетамин',tags:['dark','8 ч назад']},
      {icon:'⬢',title:'DarkNet листинг A41',desc:'Маркетплейс · доставка по КЗ · оплата BTC',tags:['dark','4 дн назад']},
      {icon:'◈',title:'Кошелёк bc1qx7kp...',desc:'3 транзакции на помеченные адреса',tags:['clear','2 дн назад']}
    ],
    suspects:[{icon:'◉',name:'phantom_kz',role:'Организатор',risk:87},{icon:'◉',name:'drop_shym_2',role:'Курьер',risk:65}],
    timeline:[
      {color:'var(--red)',time:'20 июн, 08:14',text:'Кейс заведён автоматически (риск 94)'},
      {color:'var(--amber)',time:'20 июн, 09:40',text:'Аналитик подтвердил приоритет'},
      {color:'var(--purple)',time:'20 июн, 11:20',text:'Найдена связь с DN-маркетом через кошелёк'},
      {color:'var(--cyan)',time:'22 июн, 13:00',text:'Добавлен phantom_kz как подозреваемый'}
    ]
  },
  {id:'CASE-002',title:'Операция «ВЕЙП»',desc:'Нелегальная оптовая торговля вейпами без акциза',status:'progress',priority:'critical',cat:'Контрабанда',region:'Алматы / Шымкент',date:'18 июн 2026',updated:'5 ч назад',signals:2,
    evidence:[
      {icon:'▤',title:'OLX #5901',desc:'Оптовая продажа вейпов без акцизных марок',tags:['clear','1 дн назад']},
      {icon:'◈',title:'Telegram @vape_opt_kz',desc:'Канал оптовых поставок · 480 подписчиков',tags:['dark','6 ч назад']}
    ],
    suspects:[{icon:'◉',name:'seller_kz77',role:'Продавец',risk:55}],
    timeline:[
      {color:'var(--amber)',time:'18 июн, 10:00',text:'Обнаружена подозрительная активность'},
      {color:'var(--cyan)',time:'19 июн, 16:30',text:'Кейс переведён в работу'}
    ]
  },
  {id:'CASE-003',title:'Утечка БД РК-001',desc:'Утечка базы данных с ИИН — 19,400 записей',status:'open',priority:'critical',cat:'Утечки',region:'Астана',date:'22 июн 2026',updated:'1 ч назад',signals:1,
    evidence:[
      {icon:'⬢',title:'DarkNet-форум RaidForums-mirror',desc:'Образец: ИИН, ФИО, телефон, адрес',tags:['dark','1 ч назад']}
    ],
    suspects:[],
    timeline:[
      {color:'var(--red)',time:'22 июн, 14:00',text:'Автообнаружение DN-публикации'},
      {color:'var(--amber)',time:'22 июн, 14:20',text:'Эскалация в отдел кибербезопасности'}
    ]
  },
  {id:'CASE-004',title:'Операция «КЛАДКИ»',desc:'Нелегальные закладки и аптеки в Кызылорде',status:'progress',priority:'medium',cat:'Наркотики',region:'Кызылорда',date:'15 июн 2026',updated:'вчера',signals:2,
    evidence:[
      {icon:'◈',title:'Telegram @kzo_zakladki',desc:'Косвенные упоминания закладок по районам',tags:['dark','2 дн назад']}
    ],
    suspects:[{icon:'◉',name:'anon_kzo',role:'Не установлен',risk:42}],
    timeline:[
      {color:'var(--amber)',time:'15 июн',text:'Обнаружены подозрительные паттерны'},
      {color:'var(--cyan)',time:'17 июн',text:'Начат сбор доказательств'}
    ]
  },
  {id:'CASE-005',title:'Операция «АЛКО»',desc:'Нелегальный опт алкоголя в Алматинской области',status:'closed',priority:'low',cat:'Контрабанда',region:'Алматинская обл.',date:'10 июн 2026',updated:'3 дн назад',signals:1,
    evidence:[
      {icon:'▤',title:'OLX #6100',desc:'Объявление удалено · опт алкоголя без лицензии',tags:['clear','3 дн назад']}
    ],
    suspects:[{icon:'◉',name:'opt_alco_kz',role:'Продавец',risk:38}],
    timeline:[
      {color:'var(--amber)',time:'10 июн',text:'Кейс заведён по сигналу OLX'},
      {color:'var(--green)',time:'21 июн',text:'Кейс закрыт — объявление удалено, продавец заблокирован'}
    ]
  }
];
let curFilter='all';
let activeId=null;

function statusLabel(s){return s==='open'?'ОТКРЫТ':s==='progress'?'В РАБОТЕ':'ЗАКРЫТ';}
function prioLabel(p){return p==='critical'?'КРИТ':p==='medium'?'СРЕДН':'НИЗК';}
function dotColor(s){return s==='open'?'var(--red)':s==='progress'?'var(--amber)':'var(--green)';}
function riskColor(r){return r>=80?'var(--red)':r>=50?'var(--amber)':'var(--green)';}

function renderCases(){
  const list=document.getElementById('casesList');
  const items=CASES.filter(c=>curFilter==='all'||c.status===curFilter);
  document.getElementById('casesCount').textContent=items.length;
  if(!items.length){list.innerHTML='<div style="padding:28px;text-align:center;color:var(--text-dim);font-family:var(--mono);font-size:10px">Нет кейсов</div>';return;}
  list.innerHTML=items.map(c=>`
    <div class="case-card status-${c.status} ${c.id===activeId?'active':''}" onclick="openCase('${c.id}')">
      <div class="case-card-header">
        <span class="case-id">${c.id}</span>
        <span class="case-status ${c.status}">${statusLabel(c.status)}</span>
      </div>
      <div class="case-title">${c.title}</div>
      <div class="case-desc">${c.desc}</div>
      <div class="case-meta">
        <span class="case-meta-item"><span class="case-dot" style="background:${dotColor(c.status)}"></span>${c.region}</span>
        <span class="case-priority prio-${c.priority}">${prioLabel(c.priority)}</span>
      </div>
    </div>`).join('');
}

function openCase(id){
  const c=CASES.find(x=>x.id===id);if(!c)return;
  activeId=id;
  document.getElementById('emptyState').style.display='none';
  const box=document.getElementById('caseDetailContent');
  box.style.display='flex';
  box.innerHTML=`
    <div class="detail-header">
      <div class="detail-case-id">${c.id} · ${c.cat}</div>
      <div class="detail-title">${c.title}</div>
      <div class="detail-meta">
        <span class="detail-meta-item">⌖ ${c.region}</span>
        <span class="detail-meta-item">▦ ${c.date}</span>
        <span class="detail-meta-item">◷ ${c.updated}</span>
        <span class="detail-meta-item">⊙ ${c.signals} сигн.</span>
        <span class="detail-meta-item">◉ ${c.suspects.length} подозр.</span>
        <span class="case-status ${c.status}" style="margin-left:0">${statusLabel(c.status)}</span>
      </div>
    </div>
    <div class="detail-content">
      <div>
        <div class="section-title">Улики (${c.evidence.length})</div>
        ${c.evidence.map(e=>`
          <div class="evidence-item">
            <div class="ev-icon">${e.icon}</div>
            <div style="flex:1">
              <div class="ev-title">${e.title}</div>
              <div class="ev-desc">${e.desc}</div>
              <div class="ev-tags">${e.tags.map(t=>t==='dark'?'<span class="ev-tag ev-tag-dark">DARKNET</span>':t==='clear'?'<span class="ev-tag ev-tag-clear">CLEARNET</span>':`<span class="ev-tag ev-tag-time">${t}</span>`).join('')}</div>
            </div>
          </div>`).join('')}
      </div>
      <div>
        <div class="section-title">Хронология</div>
        ${c.timeline.map(t=>`
          <div class="timeline-item">
            <div class="tl-dot" style="background:${t.color}"></div>
            <div class="tl-content"><div class="tl-time">${t.time}</div><div class="tl-text">${t.text}</div></div>
          </div>`).join('')}
      </div>
      <div>
        <div class="section-title">Подозреваемые (${c.suspects.length})</div>
        ${c.suspects.length?c.suspects.map(s=>`
          <div class="suspect-item">
            <div class="susp-icon">${s.icon}</div>
            <div><div class="susp-name">${s.name}</div><div class="susp-role">${s.role}</div></div>
            <div class="susp-risk" style="color:${riskColor(s.risk)}">${s.risk}</div>
          </div>`).join(''):'<div style="color:var(--text-dim);font-size:10px">Не установлены</div>'}
      </div>
    </div>
    <div class="detail-actions">
      <button class="act-btn act-btn-p">Взять в работу</button>
      <button class="act-btn act-btn-a">Эскалация</button>
      <button class="act-btn act-btn-g">Экспорт отчёта</button>
      <button class="act-btn act-btn-d" onclick="closeCase('${c.id}')">Закрыть кейс</button>
    </div>`;
  renderCases();
}

function filterCases(f,btn){
  curFilter=f;
  document.querySelectorAll('.sf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCases();
}

function closeCase(id){
  const c=CASES.find(x=>x.id===id);if(!c)return;
  if(c.status==='closed')return;
  c.status='closed';c.updated='только что';
  c.timeline.push({color:'var(--green)',time:'сейчас',text:'Кейс закрыт оператором'});
  openCase(id);
}

function createCase(){
  const t=document.getElementById('newTitle').value.trim();
  if(!t){alert('Введите название кейса');return;}
  const id='CASE-'+String(CASES.length+1).padStart(3,'0');
  CASES.unshift({
    id,title:t,desc:document.getElementById('newDesc').value.trim()||'Описание не указано',
    status:'open',priority:document.getElementById('newPriority').value,cat:document.getElementById('newCat').value,
    region:'—',date:'сегодня',updated:'только что',signals:0,
    evidence:[],suspects:[],timeline:[{color:'var(--red)',time:'сейчас',text:'Кейс создан вручную'}]
  });
  document.getElementById('newTitle').value='';
  document.getElementById('newDesc').value='';
  document.getElementById('modal').classList.remove('show');
  curFilter='all';
  document.querySelectorAll('.sf-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.sf-btn').classList.add('active');
  openCase(id);
}

renderCases();
</script>
</body>
</html>
