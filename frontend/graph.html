<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simplex — Граф</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0B0F;--bg-panel:#111318;--bg-card:#161920;
  --cyan:#00F5FF;--red:#FF2D55;--amber:#FFB800;--green:#00FF9F;
  --purple:#BF5FFF;--blue:#00BFFF;--text:#E0E0E0;--text-dim:#6B7280;--border:#1E2530;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.logo{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--cyan);text-shadow:0 0 12px #00F5FF88;letter-spacing:2px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:1px}
.nav-pills{display:flex;gap:4px;margin-left:16px}
.nav-pill{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:3px;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;text-decoration:none;transition:all .15s;letter-spacing:.5px}
.nav-pill:hover{border-color:var(--cyan)44;color:var(--text)}
.nav-pill.active{border-color:var(--cyan)66;color:var(--cyan);background:var(--cyan)0f}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tool-btn{font-family:var(--mono);font-size:10px;padding:5px 10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);border-radius:3px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.tool-btn:hover,.tool-btn.active{border-color:var(--cyan)66;color:var(--cyan);background:var(--cyan)0f}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--cyan)22;border:1px solid var(--cyan)44;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:var(--cyan)}
.main{display:flex;flex:1;overflow:hidden}
.graph-wrap{flex:1;position:relative;overflow:hidden}
.graph-canvas{position:absolute;inset:0;background-image:radial-gradient(circle,#1E253044 1px,transparent 1px);background-size:32px 32px}
/* TOOLTIP */
.tooltip{
  position:fixed;background:var(--bg-panel);border:1px solid var(--border);
  border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:11px;
  color:var(--text);pointer-events:none;z-index:50;min-width:160px;
  box-shadow:0 4px 20px #00000066;display:none;
}
.tooltip-title{font-size:12px;font-weight:500;margin-bottom:4px}
.tooltip-row{font-size:10px;color:var(--text-dim);margin-top:2px}
.tooltip-row span{color:var(--text)}
/* RIGHT PANEL */
.rp{width:0;flex-shrink:0;background:var(--bg-panel);border-left:1px solid var(--border);overflow:hidden;transition:width .25s ease}
.rp.open{width:320px}
.rp-inner{width:320px;padding:18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%}
.rp-inner::-webkit-scrollbar{width:3px}.rp-inner::-webkit-scrollbar-thumb{background:var(--border)}
.panel-close{background:none;border:1px solid var(--border);color:var(--text-dim);width:24px;height:24px;border-radius:3px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;align-self:flex-end}
.panel-close:hover{border-color:var(--red)66;color:var(--red)}
.rp-title{font-family:var(--mono);font-size:14px;color:var(--text);font-weight:500}
.rp-sub{font-size:11px;color:var(--text-dim)}
.rp-section{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:10px;text-align:center}
.stat-val{font-family:var(--mono);font-size:18px;font-weight:700;margin-bottom:2px}
.stat-label{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.5px}
.nbtn{width:100%;font-family:var(--mono);font-size:10px;letter-spacing:.8px;padding:8px;border-radius:3px;cursor:pointer;transition:all .15s;text-transform:uppercase;text-align:center;border:1px solid;margin-top:4px}
.nbtn-p{background:var(--cyan)18;color:var(--cyan);border-color:var(--cyan)44}
.nbtn-p:hover{background:var(--cyan)28;box-shadow:0 0 10px var(--cyan)22}
.nbtn-g{background:transparent;color:var(--text-dim);border-color:var(--border)}
.nbtn-g:hover{color:var(--text)}
.bottom-bar{height:40px;background:var(--bg-panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:20px;flex-shrink:0}
.bstat{font-family:var(--mono);font-size:10px;color:var(--text-dim)}
.bstat b{color:var(--cyan)}
.legend{display:flex;gap:12px;margin-left:auto}
.leg-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--text-dim)}
.leg-circle{width:10px;height:10px;border-radius:50%}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">◈ Simplex</div>
  <div class="live-dot"></div>
  <span class="live-label">LIVE</span>
  <nav class="nav-pills">
    <a class="nav-pill" href="feed.html">ЛЕНТА</a>
    <a class="nav-pill" href="board.html">ДОСКА</a>
    <a class="nav-pill active" href="#">ГРАФ</a>
    <a class="nav-pill" href="map.html">КАРТА</a>
    <a class="nav-pill" href="cases.html">КЕЙСЫ</a>
  </nav>
  <div class="topbar-right">
    <button class="tool-btn" onclick="filterType('all')">ВСЕ</button>
    <button class="tool-btn" onclick="filterType('person')">◉ ЛИЦА</button>
    <button class="tool-btn" onclick="filterType('darknet')">⬢ DARKNET</button>
    <button class="tool-btn" onclick="relayout()">⊞ ПЕРЕСТРОИТЬ</button>
    <div class="avatar">АН</div>
  </div>
</div>
<div class="main">
  <div class="graph-wrap">
    <div class="graph-canvas"></div>
    <canvas id="graphCanvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  </div>
  <div class="rp" id="rp"><div class="rp-inner" id="rpInner"></div></div>
</div>
<div class="bottom-bar">
  <span class="bstat"><b>12</b> узлов</span>
  <span class="bstat"><b>12</b> связей</span>
  <span class="bstat"><b>3</b> кластера</span>
  <div class="legend">
    <div class="leg-item"><div class="leg-circle" style="background:var(--red)"></div> КРИТИЧ.</div>
    <div class="leg-item"><div class="leg-circle" style="background:var(--amber)"></div> СРЕДН.</div>
    <div class="leg-item"><div class="leg-circle" style="background:var(--green)"></div> НИЗКИЙ</div>
    <div class="leg-item"><div class="leg-circle" style="background:var(--purple);opacity:.7"></div> DARKNET</div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const W=()=>document.querySelector('.graph-wrap').offsetWidth;
const H=()=>document.querySelector('.graph-wrap').offsetHeight;
const canvas=document.getElementById('graphCanvas');
const ctx=canvas.getContext('2d');

const NODES=[
  {id:'n1',label:'phantom_kz',type:'person',risk:87,level:'critical',dark:true,x:0,y:0,vx:0,vy:0},
  {id:'n2',label:'@kz_drop_alm',type:'telegram',risk:94,level:'critical',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n3',label:'bc1qx7kp',type:'wallet',risk:82,level:'critical',dark:true,x:0,y:0,vx:0,vy:0},
  {id:'n4',label:'DN-маркет A41',type:'darknet',risk:91,level:'critical',dark:true,x:0,y:0,vx:0,vy:0},
  {id:'n5',label:'drop_shym_2',type:'person',risk:65,level:'medium',dark:true,x:0,y:0,vx:0,vy:0},
  {id:'n6',label:'OLX #4821',type:'listing',risk:55,level:'medium',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n7',label:'bc1qm88',type:'wallet',risk:61,level:'medium',dark:true,x:0,y:0,vx:0,vy:0},
  {id:'n8',label:'@vape_opt_kz',type:'telegram',risk:40,level:'medium',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n9',label:'seller_kz77',type:'person',risk:55,level:'medium',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n10',label:'+7701234...',type:'phone',risk:45,level:'medium',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n11',label:'OLX #7744',type:'listing',risk:22,level:'low',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n12',label:'@kz_alco',type:'telegram',risk:38,level:'low',dark:false,x:0,y:0,vx:0,vy:0},
];
const EDGES=[
  {s:'n1',t:'n2',color:'#BF5FFF',label:'ник'},
  {s:'n1',t:'n3',color:'#00F5FF',label:'кошелёк'},
  {s:'n2',t:'n3',color:'#00F5FF',label:'кошелёк'},
  {s:'n3',t:'n4',color:'#BF5FFF',label:'DN-адрес'},
  {s:'n4',t:'n5',color:'#FF2D55',label:'дроп'},
  {s:'n6',t:'n1',color:'#BF5FFF',label:'ник'},
  {s:'n7',t:'n3',color:'#00F5FF',label:'цепочка'},
  {s:'n8',t:'n6',color:'#FFB800',label:'телефон'},
  {s:'n9',t:'n8',color:'#BF5FFF',label:'ник'},
  {s:'n10',t:'n9',color:'#FFB800',label:'телефон'},
  {s:'n11',t:'n9',color:'#BF5FFF',label:'ник'},
  {s:'n12',t:'n10',color:'#FFB800',label:'телефон'},
];

let scale=1,panX=0,panY=0,isDragging=false,dragNode=null,panStart={x:0,y:0},panOrigin={x:0,y:0},hoveredNode=null,selectedNode=null,filterActive='all',animFrame;

function initPositions(){
  const w=W(),h=H();
  NODES.forEach((n,i)=>{
    const angle=(i/NODES.length)*Math.PI*2;
    const r=Math.min(w,h)*0.32;
    n.x=w/2+r*Math.cos(angle);
    n.y=h/2+r*Math.sin(angle);
  });
}

const nodeColors={critical:'#FF2D55',medium:'#FFB800',low:'#00FF9F'};
const typeEmoji={person:'◉',telegram:'◈',wallet:'◈',darknet:'⬢',listing:'▤',phone:'◎'};

function toScreen(x,y){return{x:x*scale+panX,y:y*scale+panY};}
function toWorld(x,y){return{x:(x-panX)/scale,y:(y-panY)/scale};}

function resize(){canvas.width=W();canvas.height=H();}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // edges
  EDGES.forEach(e=>{
    const s=NODES.find(n=>n.id===e.s),t=NODES.find(n=>n.id===e.t);
    if(!s||!t)return;
    if(filterActive!=='all'&&s.type!==filterActive&&t.type!==filterActive)return;
    const sp=toScreen(s.x,s.y),tp=toScreen(t.x,t.y);
    ctx.save();
    ctx.strokeStyle=e.color;
    ctx.globalAlpha=selectedNode&&(e.s===selectedNode||e.t===selectedNode)?0.9:0.4;
    ctx.lineWidth=selectedNode&&(e.s===selectedNode||e.t===selectedNode)?2:1.2;
    ctx.setLineDash([5,4]);
    ctx.beginPath();
    const cx=(sp.x+tp.x)/2,cy=(sp.y+tp.y)/2-30;
    ctx.moveTo(sp.x,sp.y);ctx.quadraticCurveTo(cx,cy,tp.x,tp.y);
    ctx.stroke();
    // label
    if(selectedNode&&(e.s===selectedNode||e.t===selectedNode)){
      ctx.globalAlpha=0.7;ctx.font='9px JetBrains Mono';ctx.fillStyle=e.color;
      ctx.setLineDash([]);
      ctx.fillText(e.label,(sp.x+tp.x)/2,(sp.y+tp.y)/2-18);
    }
    ctx.restore();
  });
  // nodes
  NODES.forEach(n=>{
    if(filterActive!=='all'&&n.type!==filterActive)return;
    const p=toScreen(n.x,n.y);
    const r=8+(n.risk/100)*14;
    ctx.save();
    // glow
    if(n.id===hoveredNode||n.id===selectedNode){
      ctx.shadowColor=nodeColors[n.level];ctx.shadowBlur=20;
    }
    if(n.dark){
      ctx.shadowColor='#BF5FFF';ctx.shadowBlur=n.id===hoveredNode?24:10;
    }
    ctx.globalAlpha=selectedNode&&n.id!==selectedNode&&!EDGES.some(e=>e.s===selectedNode&&e.t===n.id||e.t===selectedNode&&e.s===n.id)?0.35:1;
    // outer ring
    ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,Math.PI*2);
    ctx.strokeStyle=n.id===selectedNode?nodeColors[n.level]:n.dark?'#BF5FFF44':'#1E253088';
    ctx.lineWidth=n.id===selectedNode?2:1;
    ctx.stroke();
    // fill
    const grad=ctx.createRadialGradient(p.x-r*0.3,p.y-r*0.3,0,p.x,p.y,r);
    grad.addColorStop(0,nodeColors[n.level]+'44');
    grad.addColorStop(1,nodeColors[n.level]+'18');
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=grad;ctx.fill();
    ctx.strokeStyle=nodeColors[n.level];ctx.lineWidth=1.5;ctx.stroke();
    // icon
    ctx.font=`${r*0.9}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    ctx.fillText(typeEmoji[n.type]||'▦',p.x,p.y);
    // label
    ctx.font='10px JetBrains Mono';ctx.fillStyle=n.id===hoveredNode||n.id===selectedNode?nodeColors[n.level]:'#6B7280';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(n.label.length>14?n.label.slice(0,14)+'...':n.label,p.x,p.y+r+6);
    ctx.restore();
  });
  animFrame=requestAnimationFrame(draw);
}

function getNodeAt(cx,cy){
  const w=toWorld(cx,cy);
  return NODES.find(n=>{
    if(filterActive!=='all'&&n.type!==filterActive)return false;
    const r=10+(n.risk/100)*14;
    return Math.hypot(n.x-w.x,n.y-w.y)<r+6;
  });
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  if(dragNode){
    const w=toWorld(mx,my);
    dragNode.x=w.x;dragNode.y=w.y;
    return;
  }
  if(isDragging){
    panX=panOrigin.x+(e.clientX-panStart.x);
    panY=panOrigin.y+(e.clientY-panStart.y);
    return;
  }
  const n=getNodeAt(mx,my);
  hoveredNode=n?n.id:null;
  canvas.style.cursor=n?'pointer':'grab';
  const tip=document.getElementById('tooltip');
  if(n){
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';
    tip.innerHTML=`<div class="tooltip-title" style="color:${nodeColors[n.level]}">${typeEmoji[n.type]} ${n.label}</div>
      <div class="tooltip-row">Тип: <span>${n.type}</span></div>
      <div class="tooltip-row">Риск: <span style="color:${nodeColors[n.level]}">${n.risk}/100</span></div>
      ${n.dark?'<div class="tooltip-row" style="color:#BF5FFF">DarkNet-след</div>':''}
      <div class="tooltip-row">Связей: <span>${EDGES.filter(ed=>ed.s===n.id||ed.t===n.id).length}</span></div>`;
  } else { tip.style.display='none'; }
});
canvas.addEventListener('mousedown',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const n=getNodeAt(mx,my);
  if(n){dragNode=n;}
  else{isDragging=true;panStart={x:e.clientX,y:e.clientY};panOrigin={x:panX,y:panY};}
});
canvas.addEventListener('mouseup',e=>{
  if(dragNode){
    dragNode=null;
  } else if(!isDragging){
    const rect=canvas.getBoundingClientRect();
    const n=getNodeAt(e.clientX-rect.left,e.clientY-rect.top);
    if(n)openPanel(n.id);
    else{selectedNode=null;document.getElementById('rp').classList.remove('open');}
  }
  isDragging=false;
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?-0.1:0.1;
  const newScale=Math.max(0.3,Math.min(3,scale+delta));
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  panX=mx-(mx-panX)*(newScale/scale);
  panY=my-(my-panY)*(newScale/scale);
  scale=newScale;
},{passive:false});

function openPanel(id){
  selectedNode=id;
  const n=NODES.find(x=>x.id===id);
  if(!n)return;
  document.getElementById('rp').classList.add('open');
  const conns=EDGES.filter(e=>e.s===id||e.t===id);
  document.getElementById('rpInner').innerHTML=`
    <button class="panel-close" onclick="selectedNode=null;document.getElementById('rp').classList.remove('open')">✕</button>
    <div>
      <div style="font-size:24px;margin-bottom:6px">${typeEmoji[n.type]}</div>
      <div class="rp-title">${n.label}</div>
      <div class="rp-sub">${n.type}${n.dark?' · DarkNet-след':''}</div>
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-val" style="color:${nodeColors[n.level]}">${n.risk}</div><div class="stat-label">РИСК-БАЛЛ</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--cyan)">${conns.length}</div><div class="stat-label">СВЯЗЕЙ</div></div>
    </div>
    <div>
      <div class="rp-section">связанные узлы</div>
      ${conns.slice(0,6).map(e=>{
        const other=NODES.find(x=>x.id===(e.s===id?e.t:e.s));
        return other?`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px">
          <div style="width:8px;height:8px;border-radius:50%;background:${e.color};flex-shrink:0"></div>
          <span style="font-family:var(--mono);font-size:10px;color:var(--text)">${other.label}</span>
          <span style="margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--text-dim)">${e.label}</span>
        </div>`:'';
      }).join('')}
    </div>
    <div>
      <button class="nbtn nbtn-p">ОТКРЫТЬ НА ДОСКЕ</button>
      <button class="nbtn nbtn-g">ЗАВЕСТИ ДЕЛО</button>
    </div>`;
}
function filterType(t){
  filterActive=t;
  document.querySelectorAll('.tool-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent.trim().includes(t==='all'?'ВСЕ':t==='person'?'ЛИЦ':'НЕТ'));
  });
}
function relayout(){
  const w=W(),h=H();
  NODES.forEach((n,i)=>{
    const angle=(i/NODES.length)*Math.PI*2;
    const r=Math.min(w,h)*0.32;
    n.x=w/2+r*Math.cos(angle);
    n.y=h/2+r*Math.sin(angle);
  });
}
window.addEventListener('resize',()=>{resize();});
resize();initPositions();draw();
</script>
</body>
</html>
