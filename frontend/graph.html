<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPLEX — Граф</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090E;--bg-panel:#0B0E16;--bg-card:#0F1420;
  --cyan:#00E5FF;--red:#FF3040;--amber:#FF9200;--green:#00CC7A;
  --purple:#9B6DFF;--blue:#2979FF;
  --text:#E2E8F0;--text-mid:#8899AA;--text-dim:#374151;
  --border:rgba(255,255,255,.065);--border-mid:rgba(255,255,255,.13);
  --mono:'JetBrains Mono',monospace;--display:'Space Grotesk',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--mono);height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* TOPBAR */
.topbar{height:44px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0}
.logo{font-family:var(--display);font-size:14px;font-weight:700;color:var(--text);letter-spacing:2px;padding-right:16px}
.topbar-div{width:1px;height:20px;background:var(--border);margin:0 14px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.live-label{font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:1.2px;margin-left:5px}
.nav-pills{display:flex;gap:0;margin-left:14px}
.nav-pill{font-family:var(--mono);font-size:10px;padding:0 13px;height:44px;line-height:44px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;text-decoration:none;transition:color .15s,border-color .15s;letter-spacing:.8px;display:inline-flex;align-items:center}
.nav-pill:hover{color:var(--text-mid)}
.nav-pill.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:5px}
.tool-btn{font-family:var(--mono);font-size:9px;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:2px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.tool-btn:hover{border-color:var(--border-mid);color:var(--text-mid)}
.tool-btn.active{border-color:rgba(0,229,255,.3);color:var(--cyan);background:rgba(0,229,255,.06)}
.avatar{width:28px;height:28px;border-radius:50%;background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--cyan);margin-left:8px}
.main{display:flex;flex:1;overflow:hidden}
.graph-wrap{flex:1;position:relative;overflow:hidden}
.graph-canvas{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.035) 1px,transparent 1px);background-size:30px 30px}
/* TOOLTIP */
.tooltip{
  position:fixed;background:var(--bg-panel);border:1px solid var(--border-mid);
  border-radius:3px;padding:9px 12px;font-family:var(--mono);font-size:10px;
  color:var(--text);pointer-events:none;z-index:50;min-width:150px;
  box-shadow:0 4px 16px rgba(0,0,0,.6);display:none;
}
.tooltip-title{font-size:11px;font-weight:500;margin-bottom:4px}
.tooltip-row{font-size:9px;color:var(--text-mid);margin-top:2px}
.tooltip-row span{color:var(--text)}
/* RIGHT PANEL */
.rp{width:0;flex-shrink:0;background:var(--bg-panel);border-left:1px solid var(--border);overflow:hidden;transition:width .22s ease}
.rp.open{width:310px}
.rp-inner{width:310px;padding:15px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%}
.rp-inner::-webkit-scrollbar{width:3px}.rp-inner::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07)}
.panel-close{background:none;border:1px solid var(--border);color:var(--text-dim);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;align-self:flex-end}
.panel-close:hover{border-color:rgba(255,48,64,.3);color:var(--red)}
.rp-title{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:500}
.rp-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
.rp-section{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat-box{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:2px;padding:10px;text-align:center}
.stat-val{font-family:var(--mono);font-size:17px;font-weight:700;margin-bottom:2px}
.stat-label{font-family:var(--mono);font-size:8px;color:var(--text-dim);letter-spacing:.5px}
.nbtn{width:100%;font-family:var(--mono);font-size:9px;letter-spacing:.8px;padding:7px;border-radius:2px;cursor:pointer;transition:all .15s;text-transform:uppercase;text-align:center;border:1px solid;margin-top:3px}
.nbtn-p{background:rgba(0,229,255,.07);color:var(--cyan);border-color:rgba(0,229,255,.25)}
.nbtn-p:hover{background:rgba(0,229,255,.13)}
.nbtn-g{background:transparent;color:var(--text-dim);border-color:var(--border)}
.nbtn-g:hover{color:var(--text-mid);border-color:var(--border-mid)}
/* BOTTOM BAR */
.bottom-bar{height:32px;background:var(--bg-panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0}
.bstat{font-family:var(--mono);font-size:9px;color:var(--text-dim);padding:0 14px;border-right:1px solid var(--border)}
.bstat:first-child{padding-left:0}
.bstat b{color:var(--cyan)}
.legend{display:flex;margin-left:auto}
.leg-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--text-dim);padding:0 12px;border-right:1px solid var(--border)}
.leg-item:last-child{border-right:none;padding-right:0}
.leg-circle{width:8px;height:8px;border-radius:50%}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">SIMPLEX</div>
  <div class="topbar-div"></div>
  <div class="live-dot"></div>
  <span class="live-label">LIVE</span>
  <div class="topbar-div"></div>
  <nav class="nav-pills">
    <a class="nav-pill" href="index.html">ЛЕНТА</a>
    <a class="nav-pill" href="board.html">ДОСКА</a>
    <a class="nav-pill active" href="#">ГРАФ</a>
    <a class="nav-pill" href="map.html">КАРТА</a>
    <a class="nav-pill" href="cases.html">КЕЙСЫ</a>
  </nav>
  <div class="topbar-right">
    <button class="tool-btn active" onclick="filterType('all',this)">ВСЕ</button>
    <button class="tool-btn" onclick="filterType('person',this)">◉ ЛИЦА</button>
    <button class="tool-btn" onclick="filterType('darknet',this)">⬢ DARKNET</button>
    <button class="tool-btn" onclick="relayout()">⊞ ПЕРЕСТРОИТЬ</button>
    <div class="avatar">АН</div>
  </div>
</div>
<div class="main">
  <div class="graph-wrap">
    <div class="graph-canvas"></div>
    <canvas id="graphCanvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  </div>
  <div class="rp" id="rp"><div class="rp-inner" id="rpInner"></div></div>
</div>
<div class="bottom-bar">
  <span class="bstat"><b>12</b> узлов</span>
  <span class="bstat"><b>12</b> связей</span>
  <span class="bstat"><b>3</b> кластера</span>
  <div class="legend">
    <div class="leg-item"><div class="leg-circle" style="background:var(--red)"></div> КРИТИЧ.</div>
    <div class="leg-item"><div class="leg-circle" style="background:var(--amber)"></div> СРЕДН.</div>
    <div class="leg-item"><div class="leg-circle" style="background:var(--green)"></div> НИЗКИЙ</div>
    <div class="leg-item"><div class="leg-circle" style="background:var(--purple);opacity:.7"></div> DARKNET</div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const W=()=>document.querySelector('.graph-wrap').offsetWidth;
const H=()=>document.querySelector('.graph-wrap').offsetHeight;
const canvas=document.getElementById('graphCanvas');
const ctx=canvas.getContext('2d');

const NODES=[
  {id:'n1',label:'phantom_kz',type:'person',risk:87,level:'critical',dark:true,x:0,y:0,vx:0,vy:0},
  {id:'n2',label:'@kz_drop_alm',type:'telegram',risk:94,level:'critical',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n3',label:'bc1qx7kp',type:'wallet',risk:82,level:'critical',dark:true,x:0,y:0,vx:0,vy:0},
  {id:'n4',label:'DN-маркет A41',type:'darknet',risk:91,level:'critical',dark:true,x:0,y:0,vx:0,vy:0},
  {id:'n5',label:'drop_shym_2',type:'person',risk:65,level:'medium',dark:true,x:0,y:0,vx:0,vy:0},
  {id:'n6',label:'OLX #4821',type:'listing',risk:55,level:'medium',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n7',label:'bc1qm88',type:'wallet',risk:61,level:'medium',dark:true,x:0,y:0,vx:0,vy:0},
  {id:'n8',label:'@vape_opt_kz',type:'telegram',risk:40,level:'medium',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n9',label:'seller_kz77',type:'person',risk:55,level:'medium',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n10',label:'+7701234...',type:'phone',risk:45,level:'medium',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n11',label:'OLX #7744',type:'listing',risk:22,level:'low',dark:false,x:0,y:0,vx:0,vy:0},
  {id:'n12',label:'@kz_alco',type:'telegram',risk:38,level:'low',dark:false,x:0,y:0,vx:0,vy:0},
];
const EDGES=[
  {s:'n1',t:'n2',color:'#9B6DFF',label:'ник'},
  {s:'n1',t:'n3',color:'#00E5FF',label:'кошелёк'},
  {s:'n2',t:'n3',color:'#00E5FF',label:'кошелёк'},
  {s:'n3',t:'n4',color:'#9B6DFF',label:'DN-адрес'},
  {s:'n4',t:'n5',color:'#FF3040',label:'дроп'},
  {s:'n6',t:'n1',color:'#9B6DFF',label:'ник'},
  {s:'n7',t:'n3',color:'#00E5FF',label:'цепочка'},
  {s:'n8',t:'n6',color:'#FF9200',label:'телефон'},
  {s:'n9',t:'n8',color:'#9B6DFF',label:'ник'},
  {s:'n10',t:'n9',color:'#FF9200',label:'телефон'},
  {s:'n11',t:'n9',color:'#9B6DFF',label:'ник'},
  {s:'n12',t:'n10',color:'#FF9200',label:'телефон'},
];

let scale=1,panX=0,panY=0,isDragging=false,dragNode=null,panStart={x:0,y:0},panOrigin={x:0,y:0},hoveredNode=null,selectedNode=null,filterActive='all',animFrame;

function initPositions(){
  const w=W(),h=H();
  NODES.forEach((n,i)=>{
    const angle=(i/NODES.length)*Math.PI*2;
    const r=Math.min(w,h)*0.32;
    n.x=w/2+r*Math.cos(angle);
    n.y=h/2+r*Math.sin(angle);
  });
}

const nodeColors={critical:'#FF3040',medium:'#FF9200',low:'#00CC7A'};
const typeEmoji={person:'◉',telegram:'◈',wallet:'◈',darknet:'⬢',listing:'▤',phone:'◎'};

function toScreen(x,y){return{x:x*scale+panX,y:y*scale+panY};}
function toWorld(x,y){return{x:(x-panX)/scale,y:(y-panY)/scale};}

function resize(){canvas.width=W();canvas.height=H();}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // edges
  EDGES.forEach(e=>{
    const s=NODES.find(n=>n.id===e.s),t=NODES.find(n=>n.id===e.t);
    if(!s||!t)return;
    if(filterActive!=='all'&&s.type!==filterActive&&t.type!==filterActive)return;
    const sp=toScreen(s.x,s.y),tp=toScreen(t.x,t.y);
    ctx.save();
    ctx.strokeStyle=e.color;
    ctx.globalAlpha=selectedNode&&(e.s===selectedNode||e.t===selectedNode)?0.8:0.3;
    ctx.lineWidth=selectedNode&&(e.s===selectedNode||e.t===selectedNode)?1.5:1;
    ctx.setLineDash([5,4]);
    ctx.beginPath();
    const cx=(sp.x+tp.x)/2,cy=(sp.y+tp.y)/2-30;
    ctx.moveTo(sp.x,sp.y);ctx.quadraticCurveTo(cx,cy,tp.x,tp.y);
    ctx.stroke();
    if(selectedNode&&(e.s===selectedNode||e.t===selectedNode)){
      ctx.globalAlpha=0.6;ctx.font='8px JetBrains Mono';ctx.fillStyle=e.color;
      ctx.setLineDash([]);
      ctx.fillText(e.label,(sp.x+tp.x)/2,(sp.y+tp.y)/2-18);
    }
    ctx.restore();
  });
  // nodes
  NODES.forEach(n=>{
    if(filterActive!=='all'&&n.type!==filterActive)return;
    const p=toScreen(n.x,n.y);
    const r=7+(n.risk/100)*13;
    ctx.save();
    ctx.globalAlpha=selectedNode&&n.id!==selectedNode&&!EDGES.some(e=>e.s===selectedNode&&e.t===n.id||e.t===selectedNode&&e.s===n.id)?0.25:1;
    // outer ring
    ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,Math.PI*2);
    ctx.strokeStyle=n.id===selectedNode?nodeColors[n.level]:n.dark?'rgba(155,109,255,.2)':'rgba(255,255,255,.04)';
    ctx.lineWidth=n.id===selectedNode?1.5:1;
    ctx.stroke();
    // fill
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=nodeColors[n.level]+'1A';
    ctx.fill();
    ctx.strokeStyle=nodeColors[n.level];
    ctx.lineWidth=n.id===hoveredNode||n.id===selectedNode?1.5:1;
    ctx.globalAlpha=(selectedNode&&n.id!==selectedNode&&!EDGES.some(e=>e.s===selectedNode&&e.t===n.id||e.t===selectedNode&&e.s===n.id)?0.25:1)*(n.id===hoveredNode||n.id===selectedNode?1:0.7);
    ctx.stroke();
    // icon
    ctx.globalAlpha=selectedNode&&n.id!==selectedNode&&!EDGES.some(e=>e.s===selectedNode&&e.t===n.id||e.t===selectedNode&&e.s===n.id)?0.25:1;
    ctx.font=`${r*0.85}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=nodeColors[n.level];
    ctx.fillText(typeEmoji[n.type]||'▦',p.x,p.y);
    // label
    ctx.font='9px JetBrains Mono';
    ctx.fillStyle=n.id===hoveredNode||n.id===selectedNode?nodeColors[n.level]:'rgba(136,153,170,.6)';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(n.label.length>14?n.label.slice(0,14)+'...':n.label,p.x,p.y+r+5);
    ctx.restore();
  });
  animFrame=requestAnimationFrame(draw);
}

function getNodeAt(cx,cy){
  const w=toWorld(cx,cy);
  return NODES.find(n=>{
    if(filterActive!=='all'&&n.type!==filterActive)return false;
    const r=9+(n.risk/100)*13;
    return Math.hypot(n.x-w.x,n.y-w.y)<r+6;
  });
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  if(dragNode){
    const w=toWorld(mx,my);
    dragNode.x=w.x;dragNode.y=w.y;
    return;
  }
  if(isDragging){
    panX=panOrigin.x+(e.clientX-panStart.x);
    panY=panOrigin.y+(e.clientY-panStart.y);
    return;
  }
  const n=getNodeAt(mx,my);
  hoveredNode=n?n.id:null;
  canvas.style.cursor=n?'pointer':'grab';
  const tip=document.getElementById('tooltip');
  if(n){
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';
    tip.innerHTML=`<div class="tooltip-title" style="color:${nodeColors[n.level]}">${typeEmoji[n.type]} ${n.label}</div>
      <div class="tooltip-row">Тип: <span>${n.type}</span></div>
      <div class="tooltip-row">Риск: <span style="color:${nodeColors[n.level]}">${n.risk}/100</span></div>
      ${n.dark?'<div class="tooltip-row" style="color:#9B6DFF">DarkNet-след</div>':''}
      <div class="tooltip-row">Связей: <span>${EDGES.filter(ed=>ed.s===n.id||ed.t===n.id).length}</span></div>`;
  } else { tip.style.display='none'; }
});
canvas.addEventListener('mousedown',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const n=getNodeAt(mx,my);
  if(n){dragNode=n;}
  else{isDragging=true;panStart={x:e.clientX,y:e.clientY};panOrigin={x:panX,y:panY};}
});
canvas.addEventListener('mouseup',e=>{
  if(dragNode){
    dragNode=null;
  } else if(!isDragging){
    const rect=canvas.getBoundingClientRect();
    const n=getNodeAt(e.clientX-rect.left,e.clientY-rect.top);
    if(n)openPanel(n.id);
    else{selectedNode=null;document.getElementById('rp').classList.remove('open');}
  }
  isDragging=false;
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?-0.1:0.1;
  const newScale=Math.max(0.3,Math.min(3,scale+delta));
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  panX=mx-(mx-panX)*(newScale/scale);
  panY=my-(my-panY)*(newScale/scale);
  scale=newScale;
},{passive:false});

function openPanel(id){
  selectedNode=id;
  const n=NODES.find(x=>x.id===id);
  if(!n)return;
  document.getElementById('rp').classList.add('open');
  const conns=EDGES.filter(e=>e.s===id||e.t===id);
  document.getElementById('rpInner').innerHTML=`
    <button class="panel-close" onclick="selectedNode=null;document.getElementById('rp').classList.remove('open')">✕</button>
    <div>
      <div style="font-size:20px;margin-bottom:5px;color:${nodeColors[n.level]}">${typeEmoji[n.type]}</div>
      <div class="rp-title">${n.label}</div>
      <div class="rp-sub">${n.type}${n.dark?' · DarkNet-след':''}</div>
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-val" style="color:${nodeColors[n.level]}">${n.risk}</div><div class="stat-label">РИСК-БАЛЛ</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--cyan)">${conns.length}</div><div class="stat-label">СВЯЗЕЙ</div></div>
    </div>
    <div>
      <div class="rp-section">связанные узлы</div>
      ${conns.slice(0,6).map(e=>{
        const other=NODES.find(x=>x.id===(e.s===id?e.t:e.s));
        return other?`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
          <div style="width:7px;height:7px;border-radius:50%;background:${e.color};flex-shrink:0"></div>
          <span style="font-family:var(--mono);font-size:10px;color:var(--text)">${other.label}</span>
          <span style="margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--text-dim)">${e.label}</span>
        </div>`:'';
      }).join('')}
    </div>
    <div>
      <button class="nbtn nbtn-p">ОТКРЫТЬ НА ДОСКЕ</button>
      <button class="nbtn nbtn-g">ЗАВЕСТИ ДЕЛО</button>
    </div>`;
}
function filterType(t,btn){
  filterActive=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
}
function relayout(){
  const w=W(),h=H();
  NODES.forEach((n,i)=>{
    const angle=(i/NODES.length)*Math.PI*2;
    const r=Math.min(w,h)*0.32;
    n.x=w/2+r*Math.cos(angle);
    n.y=h/2+r*Math.sin(angle);
  });
}
window.addEventListener('resize',()=>{resize();});
resize();initPositions();draw();
</script>
</body>
</html>
